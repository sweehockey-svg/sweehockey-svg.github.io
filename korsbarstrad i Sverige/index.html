<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Körsbärskartan Sverige</title>
    <meta
      name="description"
      content="Hitta körsbärsträd på karta över hela Sverige."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,600;6..72,700&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="./styles.css?v=20260426b" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <div class="hero-copy">
          <p class="eyebrow">Körsbärskartan Sverige</p>
          <h1>Karta över körsbärsträd i Sverige</h1>
          <p class="lead">
            Utforska blomningen på karta, öppna bilder och hoppa snabbt mellan
            platser från norr till söder.
          </p>
          <div class="hero-actions">
            <button id="show-user" class="button">Ladda mina träd</button>
            <button id="show-all" class="button button-secondary">Visa alla träd</button>
          </div>
        </div>
      </header>

      <main class="content">
        <section class="panel selected-panel">
          <div class="selected-layout">
            <div class="selected-copy">
              <p class="eyebrow">Vald plats</p>
              <h2 id="selected-title">Ingen vald plats ännu</h2>
              <p id="selected-meta" class="meta"></p>
              <p id="selected-description" class="description"></p>
              <p id="selected-status" class="status">Status: redo</p>
            </div>
            <div id="selected-image" class="selected-image is-empty">
              <span>Ingen bild vald än</span>
            </div>
          </div>
        </section>

        <section class="panel map-panel">
          <div class="map-toolbar">
            <label class="search-field" for="search-input">
              <span>Sök</span>
              <input
                id="search-input"
                type="search"
                placeholder="Sök på namn, stad eller beskrivning"
              />
            </label>
            <p id="result-count" class="result-count">0 träd</p>
          </div>
          <div id="map"></div>
        </section>

        <section class="panel">
          <p class="eyebrow">Platser</p>
          <div id="cards" class="cards"></div>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./trees.js?v=20260426b"></script>
    <script src="./app.js?v=20260426b"></script>
  </body>
</html>
