<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26 Spring Checks</title>
  <style>
    :root {
      --navy: #03045e;
      --navy-2: #0b144f;
      --accent: #ff5a8a;
      --bg: #eef2f7;
      --panel: #ffffff;
      --panel-soft: #f8fbff;
      --border: #d9e1ee;
      --border-strong: #c6d2e3;
      --text: #111827;
      --muted: #64748b;
      --ok: #198754;
      --danger: #dc3545;
      --warning: #c58a00;
      --gold-1: #d9ba52;
      --gold-2: #edd983;
      --gray-1: #d4d8e0;
      --gray-2: #eceff5;
      --link: #0b57d0;
      --shadow: 0 10px 28px rgba(7, 18, 79, 0.08);
      --shadow-soft: 0 4px 14px rgba(7, 18, 79, 0.05);
      --radius: 16px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.55), transparent 30%),
        linear-gradient(180deg, #edf2f8 0%, #edf1f6 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0)),
        linear-gradient(135deg, #0b0f4f, #1b005c 55%, #5b001a);
    }

    .login-screen.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 560px;
      background: rgba(255,255,255,0.98);
      border: 1px solid rgba(219, 226, 240, 0.9);
      border-radius: 22px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.28);
      padding: 30px 26px;
      backdrop-filter: blur(4px);
    }

    .login-title {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #07124f;
    }

    .login-warning {
      margin: 0 0 22px;
      font-size: 14px;
      line-height: 1.55;
      color: #334155;
      font-weight: 700;
    }

    .login-warning strong { color: #7f1d1d; }

    .login-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #07124f;
    }

    .login-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .login-input {
      flex: 1 1 260px;
      min-width: 0;
      height: 48px;
      border: 1px solid #cfd7e6;
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      background: #fff;
      transition: 0.15s ease;
    }

    .login-input:focus {
      border-color: #8ea3d6;
      box-shadow: 0 0 0 3px rgba(11, 87, 208, 0.08);
    }

    .login-btn {
      height: 48px;
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      background: var(--accent);
      color: white;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 6px 16px rgba(255, 90, 138, 0.28);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .login-btn:hover {
      filter: brightness(0.98);
      transform: translateY(-1px);
    }

    .login-error {
      display: none;
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 12px;
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #b91c1c;
      font-size: 13px;
      font-weight: 800;
    }

    .site-shell.locked { display: none; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(3, 4, 94, 0.98);
      color: white;
      border-bottom: 3px solid #00113a;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.2);
      backdrop-filter: blur(8px);
    }

    .site-header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .site-header-topline { justify-content: flex-start; }

    .brand {
      font-size: 22px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .brand span { opacity: 0.85; }

    .site-header-titleblock {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .site-header-title {
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1;
      color: white;
    }

    .site-header-subtitle {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      opacity: 0.9;
      color: white;
    }

    .mobile-menu-btn {
      display: none;
      margin-left: auto;
      border: 1px solid rgba(255,255,255,0.18);
      background: rgba(255,255,255,0.08);
      color: white;
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
    }

    .page {
      max-width: 1320px;
      margin: 22px auto 34px;
      padding: 0 16px;
    }

    .page-card {
      background: rgba(255,255,255,0.94);
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .page-top {
      padding: 18px 18px 12px;
      border-bottom: 1px solid #e7edf6;
      background: linear-gradient(to bottom, rgba(255,255,255,0.98), rgba(248,250,255,0.98));
    }

    h1 {
      margin: 0 0 14px 0;
      font-size: 30px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #07124f;
      line-height: 1;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tabs button {
      padding: 10px 13px;
      border: 1px solid #cfd8e8;
      background: linear-gradient(to bottom, #ffffff, #f7f9fd);
      color: #0b144f;
      cursor: pointer;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.1;
      transition: 0.15s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.7);
    }

    .tabs button:hover {
      background: #f2f6ff;
      border-color: #aebedf;
      transform: translateY(-1px);
    }

    .tabs button.active {
      background: linear-gradient(to bottom, #0f1c77, #03045e);
      color: white;
      border-color: var(--navy);
      box-shadow: 0 8px 18px rgba(3, 4, 94, 0.22);
    }

    .mobile-tabs-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(3, 4, 94, 0.55);
      padding: 0;
      backdrop-filter: blur(2px);
    }

    .mobile-tabs-panel.open { display: block; }

    .mobile-tabs-sheet {
      position: absolute;
      right: 0;
      top: 0;
      width: min(88vw, 360px);
      height: 100%;
      background: white;
      box-shadow: -10px 0 24px rgba(0, 0, 0, 0.18);
      display: flex;
      flex-direction: column;
    }

    .mobile-tabs-head {
      padding: 16px;
      border-bottom: 1px solid #e8edf5;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #f8faff;
    }

    .mobile-tabs-title {
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      color: #07124f;
      letter-spacing: 0.5px;
    }

    .mobile-close-btn {
      border: 1px solid #d6def0;
      background: white;
      color: #07124f;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .mobile-tabs-list {
      padding: 12px;
      display: grid;
      gap: 8px;
      overflow-y: auto;
    }

    .mobile-tab-btn {
      width: 100%;
      text-align: left;
      border: 1px solid #dbe3f2;
      background: white;
      color: #0b144f;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.25;
      cursor: pointer;
    }

    .mobile-tab-btn.active {
      background: var(--navy);
      color: white;
      border-color: var(--navy);
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding-top: 2px;
    }

    .action-btn {
      padding: 10px 15px;
      border: 0;
      background: linear-gradient(to bottom, #ff6c96, #ff4f84);
      color: white;
      cursor: pointer;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      box-shadow: 0 8px 16px rgba(255, 90, 138, 0.24);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .icon-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
    }

    .mail-icon-btn,
    .copy-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      background: linear-gradient(to bottom, #ff6c96, #ff4f84);
      color: white;
      box-shadow: 0 8px 16px rgba(255, 90, 138, 0.24);
      transition: transform 0.12s ease, filter 0.12s ease;
      font-size: 16px;
      line-height: 1;
    }

    .mail-icon-btn:hover,
    .copy-icon-btn:hover {
      transform: translateY(-1px);
      filter: brightness(0.98);
    }

    .status {
      font-size: 12px;
      font-weight: 800;
      color: #334155;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      background: #f8fbff;
      border: 1px solid #e3eaf5;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .small {
      font-size: 11px;
      color: var(--muted);
      background: #f8fbff;
      border: 1px solid #e3eaf5;
      padding: 8px 10px;
      border-radius: 10px;
    }

    .content-area {
      padding: 16px;
      background: linear-gradient(to bottom, #f7f9fd, #f2f6fb);
    }

    .table-wrap,
    .proqual-wrap {
      overflow-x: auto;
      background: white;
      border: 1px solid #dfe6f1;
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    .section-wrap {
      overflow-x: auto;
      background: white;
      border: 1px solid #dfe6f1;
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 12px;
    }

    thead {
      background: linear-gradient(to right, #050967, #08105e);
      color: white;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid #ebeff6;
      text-align: left;
      white-space: nowrap;
      line-height: 1.2;
      vertical-align: middle;
    }

    th {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.45px;
    }

    .abbr-head {
      position: relative;
      cursor: help;
    }

    .abbr-head[data-full-label]:hover::before {
      content: attr(data-full-label);
      position: absolute;
      left: 50%;
      bottom: calc(100% + 8px);
      transform: translateX(-50%);
      background: #111827;
      color: white;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 11px;
      font-weight: 800;
      text-transform: none;
      letter-spacing: 0;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      z-index: 20;
      pointer-events: none;
    }

    .abbr-head[data-full-label]:hover::after {
      content: "";
      position: absolute;
      left: 50%;
      bottom: 100%;
      transform: translateX(-50%);
      border: 6px solid transparent;
      border-top: 0;
      border-bottom-color: #111827;
      z-index: 19;
      pointer-events: none;
    }

    #results thead th.sortable {
      cursor: pointer;
      user-select: none;
      position: relative;
      padding-right: 22px;
    }

    #results thead th.sortable:hover { background: #0b144f; }

    #results thead th.sortable::after {
      content: "↕";
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      opacity: 0.7;
    }

    #results thead th.sort-asc::after {
      content: "▲";
      opacity: 1;
    }

    #results thead th.sort-desc::after {
      content: "▼";
      opacity: 1;
    }

    tbody tr:nth-child(even) { background: #fbfcff; }
    tbody tr:hover { background: #eef4ff; }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tbody tr.not-ok { background: #ffe7e7 !important; }
    tbody tr.not-ok:nth-child(even) { background: #ffdfdf !important; }
    tbody tr.not-ok:hover { background: #ffd2d2 !important; }

    tbody tr.backup-warning { background: #fff4c7 !important; }
    tbody tr.backup-warning:nth-child(even) { background: #ffefb0 !important; }
    tbody tr.backup-warning:hover { background: #ffe58d !important; }

    tbody tr.backup-danger { background: #ffe3e3 !important; }
    tbody tr.backup-danger:nth-child(even) { background: #ffd9d9 !important; }
    tbody tr.backup-danger:hover { background: #ffcfcf !important; }

    tbody tr.transfer-danger { background: #ffe3e3 !important; }
    tbody tr.transfer-danger:nth-child(even) { background: #ffd9d9 !important; }
    tbody tr.transfer-danger:hover { background: #ffcfcf !important; }

    tbody tr.signup-rule-error { background: #ffe3e3 !important; }
    tbody tr.signup-rule-error:nth-child(even) { background: #ffd7d7 !important; }
    tbody tr.signup-rule-error:hover { background: #ffcaca !important; }

    tbody tr.ban-clear { background: #f3fff8 !important; }
    tbody tr.ban-clear:nth-child(even) { background: #ecfdf4 !important; }
    tbody tr.ban-clear:hover { background: #e2f8eb !important; }

    tbody tr.ban-expired { background: #f8fafc !important; }
    tbody tr.ban-expired:nth-child(even) { background: #f1f5f9 !important; }
    tbody tr.ban-expired:hover { background: #e7eef6 !important; }

    .section-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 960px;
      font-size: 12px;
    }

    .section-title-row td {
      background: linear-gradient(90deg, var(--gold-1), var(--gold-2));
      color: #0b144f;
      font-weight: 900;
      text-align: center;
      border: 0;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 12px 10px;
      border-radius: 10px 10px 0 0;
    }

    .section-title-row.gray td {
      background: linear-gradient(90deg, var(--gray-1), var(--gray-2));
      color: #0b144f;
    }

    .seed-row td {
      border-bottom: 1px solid #e8ecf3;
      padding: 10px 10px;
      background: #fff;
      line-height: 1.2;
      vertical-align: middle;
    }

    .seed-row:last-child td { border-bottom: 0; }
    .seed-row:hover td { background: #f8fbff; }

    .seed-row td:nth-child(1) {
      width: 56px;
      text-align: center;
      font-weight: 900;
      color: #0f172a;
    }

    .seed-row td:nth-child(2) {
      width: 170px;
      color: #334155;
      font-weight: 800;
    }

    .seed-row td:nth-child(3) {
      min-width: 260px;
      font-weight: 900;
      color: #0b144f;
    }

    .seed-row td:nth-child(4) {
      width: 140px;
      text-align: center;
    }

    .seed-row td:nth-child(5) {
      min-width: 220px;
      white-space: normal;
      color: #7f1d1d;
      font-weight: 800;
    }

    .seed-row.unlisted td { background: #fcfcff !important; }
    .seed-row.unlisted:hover td { background: #f5f9ff !important; }
    .seed-row.missing td { background: #fff4f4 !important; }
    .seed-row.missing:hover td { background: #ffeaea !important; }
    .seed-row.note td:nth-child(5) { color: #92400e; }
    .seed-row.disbanded td { background: #ffe3e3 !important; }
    .seed-row.disbanded:hover td { background: #ffd3d3 !important; }

    .seed-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border: 1px solid transparent;
    }

    .seed-status.ok {
      background: #e8fff1;
      color: #157347;
      border-color: #b7efcb;
    }

    .seed-status.missing {
      background: #fff1f2;
      color: #b42318;
      border-color: #fecdd3;
    }

    .seed-status.empty {
      background: #f8fafc;
      color: #64748b;
      border-color: #e2e8f0;
    }

    .seed-status.disbanded {
      background: #b42318;
      color: white;
      border-color: #b42318;
    }

    .seed-note-badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: #fff4db;
      color: #92400e;
      border: 1px solid #f6d38d;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      margin-right: 6px;
      margin-bottom: 4px;
    }

    .seed-note-badge.disbanded {
      background: #b42318;
      color: white;
      border-color: #b42318;
    }

    .seed-team-meta {
      display: block;
      margin-top: 4px;
      font-size: 11px;
      font-weight: 700;
      color: #64748b;
    }

    .spacer-row td {
      height: 12px;
      background: transparent;
      border: 0;
      padding: 0;
    }

    .error {
      color: #b00020;
      font-weight: 800;
      margin-top: 12px;
      font-size: 12px;
      background: #fff2f4;
      border: 1px solid #ffd4da;
      padding: 11px 12px;
      border-radius: 12px;
    }

    .empty {
      padding: 18px;
      color: #666;
      font-size: 12px;
    }

    .proqual-wrap {
      display: none;
      padding: 0;
    }

    .proqual-team { border-bottom: 1px solid #e7ebf2; }
    .proqual-team:last-child { border-bottom: 0; }

    .proqual-team-header {
      width: 100%;
      border: 0;
      background: linear-gradient(to bottom, #ffffff, #fbfcff);
      padding: 15px 16px;
      text-align: left;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      font: inherit;
    }

    .proqual-team-header:hover { background: #f8fbff; }

    .proqual-team-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .proqual-team-name {
      font-size: 15px;
      font-weight: 900;
      color: #07124f;
      word-break: break-word;
    }

    .proqual-team-meta {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.4px;
    }

    .proqual-team-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    .proqual-player-count {
      font-size: 12px;
      font-weight: 900;
      color: #334155;
      background: #eef3ff;
      border: 1px solid #d8e2ff;
      border-radius: 999px;
      padding: 6px 10px;
    }

    .proqual-arrow {
      font-size: 16px;
      font-weight: 900;
      color: #475569;
      transition: transform 0.15s ease;
    }

    .proqual-team.open .proqual-arrow { transform: rotate(90deg); }

    .proqual-team-body {
      display: none;
      padding: 0 16px 16px;
      background: #fcfdff;
    }

    .proqual-team.open .proqual-team-body { display: block; }

    .proqual-player-table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
    }

    .proqual-player-table thead {
      background: #0b144f;
      color: white;
    }

    .proqual-player-table th,
    .proqual-player-table td {
      padding: 8px 10px;
      border: 1px solid #e6ebf3;
      white-space: nowrap;
    }

    .proqual-player-table tbody tr:nth-child(even) { background: #f8faff; }
    .proqual-player-table tbody tr:hover { background: #eef4ff; }

    .check-team-btn {
      border: 1px solid #d6def0;
      background: linear-gradient(to bottom, #ffffff, #f7f9fd);
      color: #07124f;
      border-radius: 10px;
      padding: 7px 10px;
      font-size: 11px;

    function normalizeTeamName(value) {
      return String(value ?? '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .replace(/[^\p{L}\p{N}]+/gu, ' ')
        .trim();
    }

    function normalizePlayerName(value) {
      return String(value ?? '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    }

    const TEAM_NAME_CHANGE_MAP = new Map(
      TEAM_NAME_CHANGES.flatMap(item => {
        const oldNormalized = normalizeTeamName(item.oldName);
        const newNormalized = normalizeTeamName(item.newName);
        return [
          [oldNormalized, { oldName: item.oldName, newName: item.newName }],
          [newNormalized, { oldName: item.oldName, newName: item.newName }]
        ];
      })
    );

    function getTeamRenameInfo(teamName) {
      return TEAM_NAME_CHANGE_MAP.get(normalizeTeamName(teamName)) || null;
    }

    function getCanonicalTeamName(teamName) {
      const info = getTeamRenameInfo(teamName);
      return info ? info.newName : String(teamName || '');
    }

    function getOldTeamName(teamName) {
      const info = getTeamRenameInfo(teamName);
      return info ? info.oldName : String(teamName || '');
    }

    function getSeedTeamName(teamName) {

    }

    function getSeedRenameNote(teamName) {

      return info ? `Old name ${info.oldName}` : '';
    }

    function applyTeamNameChangesToValue(value) {

      return info ? info.newName : String(value || '');
    }

    function applyTeamNameChangesToRow(row) {
      if (!row || typeof row !== 'object') return row;
      const cloned = { ...row };

      TEAM_NAME_KEYS.forEach(key => {
        if (key in cloned && cloned[key]) {
          cloned[key] = applyTeamNameChangesToValue(cloned[key]);
        }
      });

      ['history1Team', 'history2Team', 'history3Team'].forEach(key => {
        if (key in cloned && cloned[key]) {

      });

    function normalizeBanType(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (raw.includes('suspension')) return 'Suspension';
      if (raw.includes('capt')) return 'Captaincy ban';
      return String(value || '').trim();
    }

    function getBanRole(banType) {
      const normalized = normalizeBanType(banType);
      if (normalized === 'Captaincy ban') return 'Captain / Assistant Captain';
      if (normalized === 'Suspension') return 'Player / Captain / Assistant Captain';
      return '';
    }

    function parseBanEndDate(value) {
      const text = String(value || '').trim();
      const match = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      if (!match) return null;
      const [, day, month, year] = match;
      return new Date(Number(year), Number(month) - 1, Number(day), 23, 59, 59, 999);
    }

    function isBanActive(untilValue) {
      const text = String(untilValue || '').trim().toLowerCase();
      if (!text) return true;
      if (text.includes('indefinitely')) return true;
      if (text.includes('undefined')) return true;
      if (text.includes('until the end')) return true;

      const endDate = parseBanEndDate(untilValue);
      if (!endDate) return true;

      return endDate >= new Date();
    }

    function getBackupGames(row) {
      const keys = ['totalMatchesPlayed', 'TotalGames26Winter', 'totalGames26Winter', 'matchesPlayed', 'gamesPlayed'];
      for (const key of keys) {
        const num = Number(row?.[key]);
        if (isFinite(num)) return num;
      }
      return null;
    }

    function getFullLicenseCount(row) {
      const playerCount = Number(row?.playerCount) || 0;
      const backupLicenseCount = Number(row?.backupLicenseCount) || 0;
      const unlicensedPlayerCount = Number(row?.unlicensedPlayerCount) || 0;
      return playerCount - backupLicenseCount - unlicensedPlayerCount;
    }

    function getDivisionLevel(value) {
      const division = String(value || '').trim().toUpperCase();
      if (division === 'ELITE') return 4;
      if (division === 'PRO') return 3;
      if (division === 'LITE') return 2;
      if (division === 'CORE') return 1;
      if (division === 'NEO') return 0;
      return null;
    }

    function isBigDropTransfer(row) {
      if (currentSource.key !== 'overgangar') return false;
      const fromLevel = getDivisionLevel(row?.FromDiv);
      const toLevel = getDivisionLevel(row?.ToDiv);
      if (fromLevel === null || toLevel === null) return false;
      return (fromLevel - toLevel) > 1;
    }

    function getMinimumPlayersForDivision(divisionName) {
      const division = String(divisionName || '').trim().toUpperCase();
      if (division === 'ELITE' || division === 'PRO') return 7;
      if (division === 'LITE' || division === 'CORE' || division === 'NEO') return 8;
      return 0;
    }

    function getSignupIssues(row) {
      const issues = [];
      const division = String(row?.divisionName || '').trim().toUpperCase();
      const playerCount = Number(row?.playerCount) || 0;
      const fullLicenseCount = getFullLicenseCount(row);
      const backupLicenseCount = Number(row?.backupLicenseCount) || 0;
      const minPlayers = getMinimumPlayersForDivision(division);

      if (minPlayers > 0 && playerCount < minPlayers) {
        issues.push(`needs ${minPlayers - playerCount} more player${minPlayers - playerCount === 1 ? '' : 's'} (min ${minPlayers})`);
      }

      if (playerCount > 13) {
        issues.push(`has ${playerCount - 13} player${playerCount - 13 === 1 ? '' : 's'} too many (max 13)`);
      }

      if (fullLicenseCount < 6) {
        issues.push(`needs ${6 - fullLicenseCount} more full license${6 - fullLicenseCount === 1 ? '' : 's'} (min 6)`);
      }

      if (backupLicenseCount > 3) {
        issues.push(`has ${backupLicenseCount - 3} backup license${backupLicenseCount - 3 === 1 ? '' : 's'} too many (max 3)`);
      }

      return issues;
    }

    function getSignupIssueText(row) {
      return getSignupIssues(row).join(' • ');
    }

    function getRowClass(row) {
      if (currentSource.key === 'bannedPlayers') {
        if (String(row?.status || '').toLowerCase() === 'violation') return 'not-ok';
        if (String(row?.status || '').toLowerCase() === 'clear') return 'ban-clear';
        if (String(row?.status || '').toLowerCase() === 'expired') return 'ban-expired';
        return '';
      }

      if (currentSource.key === 'signUps' && getSignupIssues(row).length > 0) {
        return 'signup-rule-error';
      }

      if (currentSource.key === 'backups') {
        const games = getBackupGames(row);
        if (games !== null) {
          if (games > 10) return 'backup-danger';
          if (games === 10) return 'backup-warning';
        }
      }

      if (isBigDropTransfer(row)) return 'transfer-danger';
      if (isNotOkRow(row)) return 'not-ok';
      return '';
    }

    function compareValues(a, b, isNumeric) {
      const aVal = a === null || a === undefined ? '' : a;
      const bVal = b === null || b === undefined ? '' : b;

      if (isNumeric) {
        const aNum = aVal === '' ? Number.NEGATIVE_INFINITY : Number(aVal);
        const bNum = bVal === '' ? Number.NEGATIVE_INFINITY : Number(bVal);
        return aNum - bNum;
      }

      return String(aVal).localeCompare(String(bVal), 'en', {
        numeric: true,
        sensitivity: 'base'
      });
    }

    function getSortedRows(rows) {
      if (!sortState.column) return [...rows];
      const isNumeric = currentNumericColumns.has(sortState.column) || sortState.column === 'fullLicenseCount';

      return [...rows].sort((a, b) => {
        let aValue = sortState.column === 'fullLicenseCount' ? getFullLicenseCount(a) : a?.[sortState.column];
        let bValue = sortState.column === 'fullLicenseCount' ? getFullLicenseCount(b) : b?.[sortState.column];

        if (sortState.column === 'signupIssue') {
          aValue = getSignupIssueText(a);
          bValue = getSignupIssueText(b);
        }

        const result = compareValues(aValue, bValue, isNumeric);
        return sortState.direction === 'asc' ? result : -result;
      });
    }

    function unwrapAllaData(data) {
      if (data && typeof data === 'object' && Array.isArray(data.backups)) return data;
      const wrappedJsonString = data?.rows?.[0]?.json_result;
      if (typeof wrappedJsonString === 'string') {
        try {
          const parsedInner = JSON.parse(wrappedJsonString);
          if (parsedInner && typeof parsedInner === 'object') return parsedInner;
        } catch {
          throw new Error('json_result in ' + DATA_FILE + ' is not valid JSON');
        }
      }
      return data;
    }

    async function fetchAllaData(forceReload = false) {
      if (allaDataCache && !forceReload) return allaDataCache;

      const res = await fetch(DATA_FILE + '?ts=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP error ' + res.status + ' for ' + DATA_FILE);

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error('Invalid JSON in ' + DATA_FILE);
      }

      data = unwrapAllaData(data);
      allaDataCache = data;
      return data;
    }

    function getRowsForSource(allData, sourceKey) {
      const rows = allData?.[sourceKey];
      if (!Array.isArray(rows)) {
        throw new Error('Key "' + sourceKey + '" is missing or is not an array in ' + DATA_FILE);
      }
      return rows;
    }

    async function getSignUpsMap(forceReload = false) {
      if (signUpsCache && !forceReload) return signUpsCache;

      const allData = await fetchAllaData(forceReload);
      const signUps = getRowsForSource(allData, 'signUps');
      const map = new Map();

      signUps.forEach(originalRow => {
        const row = applyTeamNameChangesToRow(originalRow);
        const normalized = normalizeTeamName(getTeamNameFromRow(row));
        if (normalized) map.set(normalized, row);
      });

      signUpsCache = map;
      return map;
    }

    async function getTeamLinkMap(forceReload = false) {
      if (teamLinkMapCache && !forceReload) return teamLinkMapCache;

      const allData = await fetchAllaData(forceReload);
      const map = new Map();

      Object.values(allData || {}).forEach(value => {
        if (!Array.isArray(value)) return;

        value.forEach(originalRow => {
          const row = applyTeamNameChangesToRow(originalRow);

          const possibleTeamIdKeys = [
            'teamID', 'teamId', 'TeamID', 'team_id',
            'fromTeamID', 'fromTeamId', 'toTeamID', 'toTeamId',
            'FromTeamID', 'ToTeamID'
          ];

          const possibleTeamNameKeys = ['teamName', 'Team', 'team', 'name', 'lag', 'Lag', 'clubName', 'From', 'To'];

          possibleTeamIdKeys.forEach(idKey => {
            const idValue = row?.[idKey];
            if (!idValue) return;

            possibleTeamNameKeys.forEach(nameKey => {
              const nameValue = row?.[nameKey];
              const normalized = normalizeTeamName(nameValue);
              if (normalized && !map.has(normalized)) {
                map.set(normalized, String(idValue));
              }
            });
          });

          const fallbackTeamId = row?.teamID || row?.teamId || row?.TeamID || row?.team_id;
          const fallbackTeamName = getTeamNameFromRow(row);
          const fallbackNormalized = normalizeTeamName(fallbackTeamName);

          if (fallbackTeamId && fallbackNormalized && !map.has(fallbackNormalized)) {
            map.set(fallbackNormalized, String(fallbackTeamId));
          }
        });
      });

      const signUpsMap = await getSignUpsMap(forceReload);
      signUpsMap.forEach((row, normalized) => {
        if (row?.teamID && !map.has(normalized)) {
          map.set(normalized, String(row.teamID));
        }
      });

      teamLinkMapCache = map;
      return map;
    }

    async function getPlayerLinkMap(forceReload = false) {
      if (playerLinkMapCache && !forceReload) return playerLinkMapCache;

      const allData = await fetchAllaData(forceReload);
      const map = new Map();

      Object.values(allData || {}).forEach(value => {
        if (!Array.isArray(value)) return;

        value.forEach(row => {
          const playerId = row?.playerID || row?.playerId || row?.PlayerID || row?.player_id;

          if (playerId) {
            ['Player', 'tag', 'playerName', 'player'].forEach(nameKey => {
              const playerName = row?.[nameKey];
              const normalized = normalizePlayerName(playerName);
              if (normalized && !map.has(normalized)) {
                map.set(normalized, String(playerId));
              }
            });
          }
        });
      });

      playerLinkMapCache = map;
      return map;
    }

    async function getCaptainUserIdMap(forceReload = false) {
      if (captainUserIdMapCache && !forceReload) return captainUserIdMapCache;

      const allData = await fetchAllaData(forceReload);
      const rows = Array.isArray(allData?.teamCaptains) ? allData.teamCaptains : [];
      const map = new Map();

      rows.forEach(originalRow => {
        const row = applyTeamNameChangesToRow(originalRow);
        const normalizedTeam = normalizeTeamName(row.teamName);
        const userId = String(row.userID || '').trim();
        if (!normalizedTeam || !userId) return;

        if (!map.has(normalizedTeam)) map.set(normalizedTeam, []);
        const ids = map.get(normalizedTeam);
        if (!ids.includes(userId)) ids.push(userId);
      });

      captainUserIdMapCache = map;
      return map;
    }

    async function getBackupMessageUrl(row, forceReload = false) {
      if (currentSource.key !== 'backups' && currentSource.key !== 'licenslosa') return '';

      const captainMap = await getCaptainUserIdMap(forceReload);
      const teamName = getTeamNameFromRow(row);
      const normalizedTeam = normalizeTeamName(teamName);
      const captainIds = captainMap.get(normalizedTeam) || [];
      const backupUserId = String(getUserIdFromRow(row) || '').trim();

      const recipients = [...captainIds, backupUserId]
        .map(id => String(id).trim())
        .filter(Boolean)
        .filter((id, index, arr) => arr.indexOf(id) === index);

      if (recipients.length === 0) return '';
      return `https://sportsgamer.gg/community/messenger/compose/?to=${recipients.join(',')}`;
    }

    async function copyBackupMessage(row) {
      const text = buildBackupMessage(row);
      await navigator.clipboard.writeText(text);
    }

    async function copyUnlicensedMessage(row) {
      const text = buildUnlicensedMessage(row);
      await navigator.clipboard.writeText(text);
    }

    function getProQualReqCheckRows(allData) {
      if (Array.isArray(allData?.proQualReqCheck)) {
        return allData.proQualReqCheck.map(applyTeamNameChangesToRow);
      }

      const signUps = getRowsForSource(allData, 'signUps');
      return signUps
        .map(applyTeamNameChangesToRow)
        .filter(row => String(row?.qualifierName || '').trim().toUpperCase().includes('WILDCARD'))
        .map(row => ({
          teamID: row.teamID ?? '',
          teamName: row.teamName ?? '',
          qualifierName: row.qualifierName ?? '',
          divisionName: row.divisionName ?? '',
          teamCountry: row.teamCountry ?? '',
          registrationDate: row.registrationDate ?? ''
        }));
    }

    function detectSectionDivision(sectionTitle) {
      const title = String(sectionTitle || '').toLowerCase();
      if (title === 'elite') return 'ELITE';
      if (title === 'pro') return 'PRO';
      if (title === 'lite') return 'LITE';
      if (title === 'core') return 'CORE';
      if (title === 'neo') return 'NEO';
      if (title.startsWith('elite qualifiers')) return 'ELITE_QUAL';
      if (title.startsWith('pro qualifiers')) return 'PRO_QUAL';
      return '';
    }

    function collectPresetTeamNames() {
      const set = new Set();
      presetSections.forEach(section => {
        section.rows.forEach(row => {
          const normalized = normalizeTeamName(getCanonicalTeamName(row[2]));
          if (normalized) set.add(normalized);
        });
      });
      return set;
    }

    function collectLiteListedTeams() {
      const set = new Set();
      const liteSection = presetSections.find(section => section.title === 'Lite');
      if (!liteSection) return set;
      liteSection.rows.forEach(row => {
        const normalized = normalizeTeamName(getCanonicalTeamName(row[2]));
        if (normalized) set.add(normalized);
      });
      return set;
    }

    function collectProQualifierListedTeams() {
      const set = new Set();
      const proQualSection = presetSections.find(section => section.title === 'Pro Qualifiers');
      if (!proQualSection) return set;
      proQualSection.rows.forEach(row => {
        const normalized = normalizeTeamName(getCanonicalTeamName(row[2]));
        if (normalized) set.add(normalized);
      });
      return set;
    }

    function getQualifierNote(row) {
      const qualifier = String(row?.qualifierName || '').trim().toUpperCase();
      if (qualifier.includes('PRO QUALIFIER')) return 'PRO QUAL SIGNUP';
      if (qualifier.includes('ELITE QUALIFIER')) return 'ELITE QUAL REQ';
      if (qualifier.includes('WILDCARD')) return 'PRO QUAL REQ';
      return '';
    }

    function buildRegisteredTeamInfoMap(registeredRows) {
      const map = new Map();
      registeredRows.forEach(row => {
        const normalized = normalizeTeamName(getTeamNameFromRow(row));
        if (normalized) map.set(normalized, row);
      });
      return map;
    }

    function getSeedRowNote(section, teamName, registeredInfoMap) {
      const canonicalTeamName = getCanonicalTeamName(teamName);
      const normalized = normalizeTeamName(canonicalTeamName);
      if (!normalized) return '';

      const row = registeredInfoMap.get(normalized);
      const notes = [];

      const renameNote = getSeedRenameNote(teamName);
      if (renameNote) notes.push(renameNote);

      if (!row) return notes.join(' • ');

      const listedDivision = detectSectionDivision(section.title);
      const signedDivision = String(row.divisionName || '').trim().toUpperCase();

      const qualifierNote = getQualifierNote(row);
      if (qualifierNote) notes.push(qualifierNote);

      if (
        signedDivision &&
        ['ELITE', 'PRO', 'LITE', 'CORE', 'NEO'].includes(listedDivision) &&
        signedDivision !== listedDivision &&
        !(listedDivision === 'CORE' && signedDivision === 'NEO')
      ) {
        notes.push('SIGNED UP TO ' + signedDivision);
      }

      return notes.join(' • ');
    }

    function buildUnseededByDivision(registeredRows) {
      const listedTeams = collectPresetTeamNames();
      const result = { LITE: [], CORE: [], NEO: [] };

      registeredRows.forEach(row => {
        const teamName = getTeamNameFromRow(row);
        const normalized = normalizeTeamName(teamName);
        const division = String(row.divisionName || '').trim().toUpperCase();

        if (!normalized || listedTeams.has(normalized)) return;
        if (!result[division]) return;

        result[division].push(row);
      });

      Object.keys(result).forEach(key => {
        result[key].sort((a, b) => String(a.teamName || '').localeCompare(String(b.teamName || ''), 'en'));
      });

      return result;
    }

    function buildProQualifierExtraRows(registeredRows) {
      const listedInProQual = collectProQualifierListedTeams();

      const rows = registeredRows.filter(row => {
        const qualifierNote = getQualifierNote(row);
        const normalized = normalizeTeamName(getTeamNameFromRow(row));
        return normalized && !listedInProQual.has(normalized) &&
          (qualifierNote === 'PRO QUAL SIGNUP' || qualifierNote === 'PRO QUAL REQ');
      });

      rows.sort((a, b) => {
        const aNote = getQualifierNote(a);
        const bNote = getQualifierNote(b);
        if (aNote !== bNote) return aNote.localeCompare(bNote, 'en');
        return String(a.teamName || '').localeCompare(String(b.teamName || ''), 'en');
      });

      return rows;
    }

    function getLiteSignupCount(registeredInfoMap) {
      const liteListedTeams = collectLiteListedTeams();
      let count = 0;

      liteListedTeams.forEach(normalized => {
        const info = registeredInfoMap.get(normalized);
        if (!info) return;
        const note = getQualifierNote(info);
        if (note === 'PRO QUAL REQ') return;
        count++;
      });

      return count;
    }

    function buildSignupCounts(registeredRows, registeredInfoMap, proQualifierExtraRows) {
      const counts = {
        ELITE: 0,
        ELITE_QUAL: 0,
        PRO: 0,
        PRO_QUAL: 0,
        LITE: 0,
        CORE: 0,
        NEO: 0
      };

      registeredRows.forEach(row => {
        const division = String(row.divisionName || '').trim().toUpperCase();
        const qualifier = String(row.qualifierName || '').trim().toUpperCase();

        if (division === 'ELITE') counts.ELITE++;
        if (division === 'PRO') counts.PRO++;
        if (division === 'CORE') counts.CORE++;
        if (division === 'NEO') counts.NEO++;
        if (qualifier.includes('ELITE QUALIFIER')) counts.ELITE_QUAL++;
      });

      counts.LITE = getLiteSignupCount(registeredInfoMap);
      counts.PRO_QUAL = proQualifierExtraRows.length;

      return counts;
    }

    function renderSectionTitle(title, count, headerClass = '') {
      const tr = document.createElement('tr');
      tr.className = 'section-title-row' + (headerClass ? ' ' + headerClass : '');
      const td = document.createElement('td');
      td.colSpan = 5;
      td.textContent = `${title} (${count})`;
      tr.appendChild(td);
      seedingBody.appendChild(tr);
    }

    function renderSeedHeaderRow() {
      const tr = document.createElement('tr');
      tr.className = 'seed-row';

      const labels = ['#', 'Seed', 'Team', 'Status', 'Notes'];
      labels.forEach((label, index) => {
        const td = document.createElement('td');
        td.textContent = label;
        td.style.background = '#f8fafc';
        td.style.color = '#0b144f';
        td.style.fontWeight = '900';
        td.style.textTransform = 'uppercase';
        td.style.letterSpacing = '0.4px';
        td.style.fontSize = '11px';
        if (index === 3) td.style.textAlign = 'center';
        tr.appendChild(td);
      });

      seedingBody.appendChild(tr);
    }

    function renderSeedRow(pos, seed, team, exists, note = '', extraClass = '', teamID = '') {
      const tr = document.createElement('tr');
      const seedDisplayTeam = getSeedTeamName(team);
      const canonicalTeam = getCanonicalTeamName(team);
      const seedingStatus = getSeedingTeamStatus(seedDisplayTeam);
      const isDisbanded = seedingStatus === 'DISBANDED';

      let rowClass = 'seed-row';
      if (extraClass) rowClass += ' ' + extraClass;
      if (seedDisplayTeam && !exists && !isDisbanded) rowClass += ' missing';
      if (note || isDisbanded) rowClass += ' note';
      if (isDisbanded) rowClass += ' disbanded';
      tr.className = rowClass;

      const posTd = document.createElement('td');
      posTd.textContent = pos ?? '';
      tr.appendChild(posTd);

      const seedTd = document.createElement('td');
      seedTd.textContent = seed || '';
      tr.appendChild(seedTd);

      const teamTd = document.createElement('td');
      if (seedDisplayTeam && teamID) {
        teamTd.appendChild(createLink(TEAM_BASE_URL + teamID, seedDisplayTeam, 'seed-link'));
      } else {
        teamTd.textContent = seedDisplayTeam || '';
      }

      if (extraClass.includes('unlisted')) {
        const meta = document.createElement('span');
        meta.className = 'seed-team-meta';
        meta.textContent = canonicalTeam !== seedDisplayTeam ? canonicalTeam : '';
        if (meta.textContent) teamTd.appendChild(meta);
      }

      tr.appendChild(teamTd);

      const checkTd = document.createElement('td');
      const statusBadge = document.createElement('span');

      if (!seedDisplayTeam) {
        statusBadge.className = 'seed-status empty';
        statusBadge.textContent = '-';
      } else if (isDisbanded) {
        statusBadge.className = 'seed-status disbanded';
        statusBadge.textContent = 'Disbanded';
      } else if (exists) {
        statusBadge.className = 'seed-status ok';
        statusBadge.textContent = 'Registered';
      } else {
        statusBadge.className = 'seed-status missing';
        statusBadge.textContent = 'Missing';
      }

      checkTd.appendChild(statusBadge);
      tr.appendChild(checkTd);

      const noteTd = document.createElement('td');
      const noteParts = [];
      if (note) noteParts.push(...note.split(' • ').filter(Boolean));
      if (isDisbanded) noteParts.unshift('DISBANDED');

      if (noteParts.length > 0) {
        noteParts.forEach(part => {
          const badge = document.createElement('span');
          badge.className = 'seed-note-badge' + (part === 'DISBANDED' ? ' disbanded' : '');
          badge.textContent = part;
          noteTd.appendChild(badge);
        });
      } else {
        noteTd.innerHTML = '<span style="color:#94a3b8;font-weight:700;">-</span>';
      }

      tr.appendChild(noteTd);
      seedingBody.appendChild(tr);
    }

    function renderSpacer() {
      const tr = document.createElement('tr');
      tr.className = 'spacer-row';
      const td = document.createElement('td');
      td.colSpan = 5;
      tr.appendChild(td);
      seedingBody.appendChild(tr);
    }

    async function renderPresetSections(registeredRows, forceReload = false) {
      const registeredTeamSet = new Set(
        registeredRows.map(getTeamNameFromRow).map(normalizeTeamName).filter(Boolean)
      );
      const registeredInfoMap = buildRegisteredTeamInfoMap(registeredRows);
      const signUpsMap = await getSignUpsMap(forceReload);
      const unseededByDivision = buildUnseededByDivision(registeredRows);
      const proQualifierExtraRows = buildProQualifierExtraRows(registeredRows);
      const signupCounts = buildSignupCounts(registeredRows, registeredInfoMap, proQualifierExtraRows);

      showSeeding();
      emptyMessage.style.display = 'none';
      tbody.innerHTML = '';
      headerRow.innerHTML = '';
      proQualReqWrap.innerHTML = '';
      seedingBody.innerHTML = '';
      rowCounter.textContent = '';

      presetSections.forEach((section, sectionIndex) => {
        const sectionKey = detectSectionDivision(section.title);
        let count = signupCounts[sectionKey] ?? 0;

        if (section.title === 'Pro Qualifiers') {
          const listedProQualCount = section.rows.filter(row => {
            const team = getCanonicalTeamName(row[2]);
            const normalized = normalizeTeamName(team);
            const info = registeredInfoMap.get(normalized);
            const note = info ? getQualifierNote(info) : '';
            return note === 'PRO QUAL SIGNUP' || note === 'PRO QUAL REQ';
          }).length;
          count = listedProQualCount + proQualifierExtraRows.length;
        }

        renderSectionTitle(section.title, count, section.headerClass || '');
        renderSeedHeaderRow();

        section.rows.forEach(row => {
          const [pos, seed, team] = row;
          const canonicalTeam = getCanonicalTeamName(team);
          const normalized = normalizeTeamName(canonicalTeam);
          const exists = team ? registeredTeamSet.has(normalized) : false;
          const note = team ? getSeedRowNote(section, team, registeredInfoMap) : '';
          const teamInfo = signUpsMap.get(normalized);
          renderSeedRow(pos, seed, team, exists, note, '', teamInfo?.teamID || '');
        });

        if (section.title === 'Pro Qualifiers') {
          const startIndex = section.rows.length + 1;
          proQualifierExtraRows.forEach((row, idx) => {
            renderSeedRow(
              startIndex + idx,
              'Pro Qualifiers',
              row.teamName || '',
              true,
              getSeedRowNote(section, row.teamName || '', registeredInfoMap),
              'unlisted',
              row.teamID || ''
            );
          });
        } else {
          const division = detectSectionDivision(section.title);
          const extraRows = ['LITE', 'CORE', 'NEO'].includes(division) ? unseededByDivision[division] : [];

          if (extraRows.length > 0) {
            const startIndex = section.rows.length + 1;
            extraRows.forEach((row, idx) => {
              renderSeedRow(
                startIndex + idx,
                section.title + ' Unseeded',
                row.teamName || '',
                true,
                getSeedRowNote(section, row.teamName || '', registeredInfoMap),
                'unlisted',
                row.teamID || ''
              );
            });
          }
        }

        if (sectionIndex < presetSections.length - 1) renderSpacer();
      });
    }

    function groupProQualReqRows(rows) {
      const map = new Map();

      rows.forEach(row => {
        const teamID = row.teamID ?? '';
        const teamName = row.teamName ?? 'Unknown team';
        const key = `${teamID}__${teamName}`;

        if (!map.has(key)) {
          map.set(key, {
            teamID,
            teamName,
            qualifierName: row.qualifierName || 'WILDCARD',
            players: []
          });
        }

        map.get(key).players.push(row);
      });

      return [...map.values()].sort((a, b) =>
        String(a.teamName).localeCompare(String(b.teamName), 'en', { sensitivity: 'base' })
      );
    }

    function createHistoryCell(division, team, matches) {
      const td = document.createElement('td');
      td.className = 'history-cell';

      if (!division && !team && (matches === null || matches === undefined || Number(matches) === 0)) {
        td.textContent = '';
        return td;
      }

      const divisionEl = document.createElement('span');
      divisionEl.className = 'history-division';
      divisionEl.textContent = division || '';
      td.appendChild(divisionEl);

      if (team) {
        const teamEl = document.createElement('span');
        teamEl.className = 'history-team';
        teamEl.textContent = team;
        td.appendChild(teamEl);
      }

      const matchesEl = document.createElement('span');
      matchesEl.className = 'history-matches';
      matchesEl.textContent = `${Number(matches || 0)} matches`;
      td.appendChild(matchesEl);

      return td;
    }

    async function renderProQualReqCheck(rows, forceReload = false) {
      showProQualReq();
      emptyMessage.style.display = 'none';
      tbody.innerHTML = '';
      headerRow.innerHTML = '';
      seedingBody.innerHTML = '';
      proQualReqWrap.innerHTML = '';
      rowCounter.textContent = '';

      if (!Array.isArray(rows) || rows.length === 0) {
        proQualReqWrap.innerHTML = '<div class="empty">No wildcard teams found.</div>';
        return;
      }

      const teams = groupProQualReqRows(rows);
      const playerLinkMap = await getPlayerLinkMap(forceReload);

      teams.forEach((teamGroup, teamIndex) => {
        const teamBox = document.createElement('div');
        teamBox.className = 'proqual-team';
        if (teamIndex === 0) teamBox.classList.add('open');

        const headerBtn = document.createElement('button');
        headerBtn.type = 'button';
        headerBtn.className = 'proqual-team-header';

        const left = document.createElement('div');
        left.className = 'proqual-team-left';

        const name = document.createElement('div');
        name.className = 'proqual-team-name';
        if (teamGroup.teamID) {
          name.appendChild(createLink(TEAM_BASE_URL + teamGroup.teamID, teamGroup.teamName, 'proqual-link'));
        } else {
          name.textContent = teamGroup.teamName;
        }
        left.appendChild(name);

        const meta = document.createElement('div');
        meta.className = 'proqual-team-meta';
        meta.textContent = `${teamGroup.qualifierName || 'WILDCARD'}${teamGroup.teamID ? ' • TEAM ID ' + teamGroup.teamID : ''}`;
        left.appendChild(meta);

        const right = document.createElement('div');
        right.className = 'proqual-team-right';

        const count = document.createElement('div');
        count.className = 'proqual-player-count';
        count.textContent = `${teamGroup.players.length} players`;
        right.appendChild(count);

        const arrow = document.createElement('div');
        arrow.className = 'proqual-arrow';
        arrow.textContent = '▶';
        right.appendChild(arrow);

        headerBtn.appendChild(left);
        headerBtn.appendChild(right);

        const body = document.createElement('div');
        body.className = 'proqual-team-body';

        const table = document.createElement('table');
        table.className = 'proqual-player-table';

        const thead = document.createElement('thead');
        thead.innerHTML = `
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Latest ECL</th>
            <th>2nd Latest</th>
            <th>3rd Latest</th>
          </tr>
        `;
        table.appendChild(thead);

        const tbodyEl = document.createElement('tbody');

        const sortedPlayers = [...teamGroup.players].sort((a, b) =>
          String(a.Player || '').localeCompare(String(b.Player || ''), 'en', { sensitivity: 'base' })
        );

        sortedPlayers.forEach((player, index) => {
          const tr = document.createElement('tr');

          const idx = document.createElement('td');
          idx.className = 'num';
          idx.textContent = index + 1;
          tr.appendChild(idx);

          const playerTd = document.createElement('td');
          const playerName = player.Player || player.tag || '';
          const directPlayerID = getPlayerIdFromRow(player);
          const mappedPlayerID = playerLinkMap.get(normalizePlayerName(playerName));

          if (directPlayerID || mappedPlayerID) {
            playerTd.appendChild(createLink(PLAYER_BASE_URL + (directPlayerID || mappedPlayerID), playerName, 'proqual-link'));
          } else {
            playerTd.textContent = playerName;
          }
          tr.appendChild(playerTd);

          tr.appendChild(createHistoryCell(player.history1Division, player.history1Team, player.history1Matches));
          tr.appendChild(createHistoryCell(player.history2Division, player.history2Team, player.history2Matches));
          tr.appendChild(createHistoryCell(player.history3Division, player.history3Team, player.history3Matches));

          tbodyEl.appendChild(tr);
        });

        table.appendChild(tbodyEl);
        body.appendChild(table);

        headerBtn.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          teamBox.classList.toggle('open');
        });

        teamBox.appendChild(headerBtn);
        teamBox.appendChild(body);
        proQualReqWrap.appendChild(teamBox);
      });
    }

    function appendPlainOrLinkedPlayer(td, linkText, lookupText, playerLinkMap, className = 'cell-link') {
      const normalized = normalizePlayerName(lookupText);
      const playerID = playerLinkMap.get(normalized);

      if (playerID) {
        td.appendChild(createLink(PLAYER_BASE_URL + playerID, linkText, className));
      } else {
        td.appendChild(document.createTextNode(linkText));
      }
    }

    function parsePlayerList(value) {
      return String(value || '')
        .split(',')
        .map(part => part.trim())
        .filter(Boolean);
    }

    function getPlayerAliases(entry) {
      return [entry.playerName, ...(entry.aliases || [])]
        .map(name => String(name || '').trim())
        .filter(Boolean);
    }

    function getUniqueJoined(values) {
      return [...new Set(
        values
          .map(v => String(v || '').trim())
          .filter(Boolean)
      )].join(' | ');
    }

    function findTeamIDForName(teamName, teamLinkMap) {
      return teamLinkMap.get(normalizeTeamName(teamName)) || '';
    }

    function buildRoleDisplay(role) {
      const r = String(role || '').trim();
      if (!r) return '';
      if (r === 'Assistant Captain') return 'Assistant Captain';
      if (r === 'Captain') return 'Captain';
      return r;
    }

    function buildBannedPlayerPresenceRows(allData) {
      const rows = [];

      const teamCaptains = Array.isArray(allData?.teamCaptains) ? allData.teamCaptains : [];
      teamCaptains.forEach(originalRow => {
        const row = applyTeamNameChangesToRow(originalRow);
        const playerName = String(row.tag || '').trim();
        if (!playerName) return;

        rows.push({
          normalizedPlayer: normalizePlayerName(playerName),
          playerName,
          playerID: row.playerID || '',
          teamName: row.teamName || '',
          teamID: row.teamID || '',
          divisionName: '',
          sourceKey: 'teamCaptains',
          matchRole: buildRoleDisplay(row.Role || 'Captain')
        });
      });

      const playerSources = ['backups', 'licenslosa', 'overgangar', 'proQualReqCheck'];
      playerSources.forEach(sourceKey => {
        const sourceRows = Array.isArray(allData?.[sourceKey]) ? allData[sourceKey] : [];
        sourceRows.forEach(originalRow => {
          const row = applyTeamNameChangesToRow(originalRow);
          const playerName = String(row.Player || row.tag || '').trim();
          if (!playerName) return;

          rows.push({
            normalizedPlayer: normalizePlayerName(playerName),
            playerName,
            playerID: row.playerID || '',
            teamName: row.teamName || row.To || '',
            teamID: row.teamID || '',
            divisionName: row.divisionName || row.ToDiv || '',
            sourceKey,
            matchRole: 'Player'
          });
        });
      });

      return rows;
    }

    function getRelevantBanMatches(entry, presenceRows) {
      const aliases = getPlayerAliases(entry).map(normalizePlayerName);
      const active = isBanActive(entry.until);
      if (!active) return [];

      const normalizedType = normalizeBanType(entry.banType);

      return presenceRows.filter(match => {
        if (!aliases.includes(match.normalizedPlayer)) return false;

        if (normalizedType === 'Captaincy ban') {
          return match.matchRole === 'Captain' || match.matchRole === 'Assistant Captain';
        }

        if (normalizedType === 'Suspension') {
          return true;
        }

        return false;
      });
    }

    async function buildBannedPlayersRows(forceReload = false) {
      if (bannedPlayersCache && !forceReload) return bannedPlayersCache;

      const allData = await fetchAllaData(forceReload);
      const presenceRows = buildBannedPlayerPresenceRows(allData);
      const teamLinkMap = await getTeamLinkMap(forceReload);

      const rows = BANNED_PLAYERS.map(entry => {
        const active = isBanActive(entry.until);
        const matches = getRelevantBanMatches(entry, presenceRows);

        const uniqueMatches = [];
        const seen = new Set();

        matches.forEach(match => {
          const key = [
            match.normalizedPlayer,
            normalizeTeamName(match.teamName),
            match.matchRole,
            match.sourceKey,
            match.divisionName
          ].join('__');

          if (!seen.has(key)) {
            seen.add(key);
            uniqueMatches.push(match);
          }
        });

        const teamValues = uniqueMatches.map(match => {
          const id = match.teamID || findTeamIDForName(match.teamName, teamLinkMap);
          return id ? `${match.teamName}|||${id}` : match.teamName;
        });

        return {
          playerName: entry.playerName,
          playerAliases: getPlayerAliases(entry).slice(1).join(', '),
          banType: normalizeBanType(entry.banType),
    
          until: entry.until,
          active: active ? 'Yes' : 'No',
          status: !active ? 'Expired' : uniqueMatches.length > 0 ? 'Violation' : 'Clear',
          foundAs: getUniqueJoined(uniqueMatches.map(match => match.matchRole)),
          teams: getUniqueJoined(teamValues),
          divisions: getUniqueJoined(uniqueMatches.map(match => match.divisionName || '-')),
          sources: getUniqueJoined(uniqueMatches.map(match => match.sourceKey)),
          notes: getUniqueJoined([
            entry.notes || '',
            uniqueMatches.map(match => {
              const parts = [match.matchRole, match.teamName, match.divisionName, match.sourceKey].filter(Boolean);
              return parts.join(' • ');
            }).join(' | ')
          ])
        };
      });

      bannedPlayersCache = rows;
      return rows;
    }

    async function renderTableCell(td, row, col, forceReload = false) {
      let value = row[col] ?? '';

      if (col === 'fullLicenseCount') value = getFullLicenseCount(row);
      if (col === 'signupIssue') value = getSignupIssueText(row);

      const textValue = String(value ?? '');

      if (!textValue) {
        td.textContent = '';
        return null;
      }

      const teamLinkMap = await getTeamLinkMap(forceReload);
      const playerLinkMap = await getPlayerLinkMap(forceReload);

      const directTeamID = row?.teamID || row?.teamId || row?.TeamID || row?.team_id;
      const directPlayerID = row?.playerID || row?.playerId || row?.PlayerID || row?.player_id;

      if (currentSource.key === 'bannedPlayers') {
        if (col === 'playerName') {
          const mappedPlayerID = playerLinkMap.get(normalizePlayerName(textValue));
          if (mappedPlayerID) {
            td.appendChild(createLink(PLAYER_BASE_URL + mappedPlayerID, textValue));
          } else {
            td.textContent = textValue;
          }

          if (row.playerAliases) {
            const alias = document.createElement('div');
            alias.style.marginTop = '4px';
            alias.style.fontSize = '11px';
            alias.style.color = '#64748b';
            alias.style.whiteSpace = 'normal';
            alias.textContent = 'Alias: ' + row.playerAliases;
            td.appendChild(alias);
          }
          return null;
        }

        if (col === 'teams') {
          const parts = textValue.split('|').map(part => part.trim()).filter(Boolean);
          if (parts.length === 0) {
            td.textContent = '';
            return null;
          }

          parts.forEach((part, index) => {
            const [teamName, teamID] = part.split('|||');
            if (teamID) {
              td.appendChild(createLink(TEAM_BASE_URL + teamID, teamName));
            } else {
              td.appendChild(document.createTextNode(teamName));
            }
            if (index < parts.length - 1) td.appendChild(document.createTextNode(' | '));
          });
          return null;
        }

        if (col === 'notes') {
          td.style.whiteSpace = 'normal';
          td.textContent = textValue;
          return null;
        }

        td.textContent = textValue;
        return null;
      }

      if (PLAYER_LIST_NAME_KEYS.includes(col)) {
        const parts = parsePlayerList(textValue);

        parts.forEach((part, index) => {
          const match = part.match(/^(.*?)(\s*\(\d+\))?$/);
          const nameOnly = (match?.[1] || part).trim();
          appendPlainOrLinkedPlayer(td, part, nameOnly, playerLinkMap);
          if (index < parts.length - 1) td.appendChild(document.createTextNode(', '));
        });
        return null;
      }

      if (col === 'From' || col === 'To' || col === 'history1Team' || col === 'history2Team' || col === 'history3Team') {
        td.textContent = textValue;
        return null;
      }

      if (directTeamID && TEAM_NAME_KEYS.includes(col)) {
        td.appendChild(createLink(TEAM_BASE_URL + directTeamID, textValue));
        return null;
      }

      if (directPlayerID && PLAYER_NAME_KEYS.includes(col)) {
        td.appendChild(createLink(PLAYER_BASE_URL + directPlayerID, textValue));
        return null;
      }

      if (isTeamColumn(col)) {
        const mappedTeamID = teamLinkMap.get(normalizeTeamName(textValue));
        if (mappedTeamID) {
          td.appendChild(createLink(TEAM_BASE_URL + mappedTeamID, textValue));
          return null;
        }
      }

      if (isPlayerColumn(col)) {
        const mappedPlayerID = playerLinkMap.get(normalizePlayerName(textValue));
        if (mappedPlayerID) {
          td.appendChild(createLink(PLAYER_BASE_URL + mappedPlayerID, textValue));
          return null;
        }
      }

      const anyMappedPlayerID = playerLinkMap.get(normalizePlayerName(textValue));
      if (anyMappedPlayerID) {
        td.appendChild(createLink(PLAYER_BASE_URL + anyMappedPlayerID, textValue));
        return null;
      }

      td.textContent = textValue;
      return null;
    }

    function getSignUpsHeaderLabel(col) {
      const labels = {
        teamName: 'Team',
        teamCountry: 'Country',
        registrationDate: 'Reg. Date',
        divisionName: 'Division',
        qualifierName: 'Qualifier',
        playerCount: 'Players',
        fullLicenseCount: 'Full Lic.',
        backupLicenseCount: 'Backup Lic.',
        unlicensedPlayerCount: 'No Lic.',
        signupIssue: 'Issue'
      };
      return labels[col] || col;
    }

    function getSignUpsHeaderFullLabel(col) {
      const fullLabels = {
        teamName: 'Team Name',
        teamCountry: 'Team Country',
        registrationDate: 'Registration Date',
        divisionName: 'Division Name',
        qualifierName: 'Qualifier Name',
        playerCount: 'Player Count',
        fullLicenseCount: 'Full License Count',
        backupLicenseCount: 'Backup License Count',
        unlicensedPlayerCount: 'Unlicensed Player Count',
        signupIssue: 'Missing Requirements / Rule Violations'
      };
      return fullLabels[col] || col;
    }

    async function renderTableBody(rows, forceReload = false) {
      tbody.innerHTML = '';
      const hideIndex = currentSource.key === 'signUps';
      const visibleColumns = getVisibleColumns();

      for (const [index, originalRow] of rows.entries()) {
        const row = currentSource.key === 'bannedPlayers' ? originalRow : applyTeamNameChangesToRow(originalRow);
        const tr = document.createElement('tr');
        const rowClass = getRowClass(row);
        if (rowClass) tr.classList.add(rowClass);

        let detailRow = null;

        if (!hideIndex) {
          const indexTd = document.createElement('td');
          indexTd.className = 'num';
          indexTd.textContent = index + 1;
          tr.appendChild(indexTd);
        }

        for (const col of visibleColumns) {
          const td = document.createElement('td');

          if (col === '__sendMail') {
            const games = getBackupGames(row);
            const actions = document.createElement('div');
            actions.className = 'icon-actions';

            if (currentSource.key === 'backups') {
              if (games !== null) {
                const mailUrl = await getBackupMessageUrl(row, forceReload);

                if (mailUrl) {
                  const btn = document.createElement('a');
                  btn.href = mailUrl;
                  btn.target = '_blank';
                  btn.rel = 'noopener noreferrer';
                  btn.className = 'mail-icon-btn';
                  btn.title = 'Open message';
                  btn.setAttribute('aria-label', 'Open message');
                  btn.textContent = '✉';
                  actions.appendChild(btn);
                }

                const copyBtn = document.createElement('button');
                copyBtn.type = 'button';
                copyBtn.className = 'copy-icon-btn';
                copyBtn.title = 'Copy preset message';
                copyBtn.setAttribute('aria-label', 'Copy preset message');
                copyBtn.textContent = '⧉';
                copyBtn.addEventListener('click', async () => {
                  try {
                    await copyBackupMessage(row);
                    setStatus('Message copied');
                  } catch (err) {
                    console.error(err);
                    setStatus('Copy failed');
                  }
                });
                actions.appendChild(copyBtn);
              }
            }

            if (currentSource.key === 'licenslosa') {
              const mailUrl = await getBackupMessageUrl(row, forceReload);

              if (mailUrl) {
                const btn = document.createElement('a');
                btn.href = mailUrl;
                btn.target = '_blank';
                btn.rel = 'noopener noreferrer';
                btn.className = 'mail-icon-btn';
                btn.title = 'Open message';
                btn.setAttribute('aria-label', 'Open message');
                btn.textContent = '✉';
                actions.appendChild(btn);
              }

              const copyBtn = document.createElement('button');
              copyBtn.type = 'button';
              copyBtn.className = 'copy-icon-btn';
              copyBtn.title = 'Copy preset message';
              copyBtn.setAttribute('aria-label', 'Copy preset message');
              copyBtn.textContent = '⧉';
              copyBtn.addEventListener('click', async () => {
                try {
                  await copyUnlicensedMessage(row);
                  setStatus('Message copied');
                } catch (err) {
                  console.error(err);
                  setStatus('Copy failed');
                }
              });
              actions.appendChild(copyBtn);
            }

            td.appendChild(actions);
            tr.appendChild(td);
            continue;
          }

          if (currentNumericColumns.has(col) || col === 'fullLicenseCount') td.className = 'num';
          if (col === 'signupIssue' || col === 'notes') td.style.whiteSpace = 'normal';
          await renderTableCell(td, row, col, forceReload);
          tr.appendChild(td);
        }

        if (useTeamDropdownRows()) {
          const checkTd = document.createElement('td');

          if (isCompatibilityNotOk(row)) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'check-team-btn';
            btn.textContent = 'Check Team';
            checkTd.appendChild(btn);

            const detailItems = getDropdownDetailItems(row);
            detailRow = document.createElement('tr');
            detailRow.className = 'team-detail-row';

            const detailCell = document.createElement('td');
            detailCell.className = 'team-detail-cell';
            detailCell.colSpan = visibleColumns.length + (hideIndex ? 1 : 2);

            const detailBox = document.createElement('div');
            detailBox.className = 'team-detail-box';

            const detailGrid = document.createElement('div');
            detailGrid.className = 'team-detail-grid';

            if (detailItems.length > 0) {
              detailItems.forEach(item => detailGrid.appendChild(createTeamDetailCard(item.label, item.value)));
            } else {
              detailGrid.appendChild(createEmptyTeamDetailCard());
            }

            detailBox.appendChild(detailGrid);
            detailCell.appendChild(detailBox);
            detailRow.appendChild(detailCell);

            btn.addEventListener('click', () => {
              const isOpen = detailRow.classList.toggle('open');
              btn.textContent = isOpen ? 'Hide Team' : 'Check Team';
            });
          }

          tr.appendChild(checkTd);
        }

        tbody.appendChild(tr);
        if (detailRow) tbody.appendChild(detailRow);
      }
    }

    function renderSortableHeader() {
      headerRow.innerHTML = '';
      const hideIndex = currentSource.key === 'signUps';
      const visibleColumns = getVisibleColumns();

      if (!hideIndex) {
        const indexTh = document.createElement('th');
        indexTh.textContent = '#';
        headerRow.appendChild(indexTh);
      }

      visibleColumns.forEach(col => {
        const th = document.createElement('th');

        if (col === '__sendMail') {
          th.textContent = 'MAIL';
          headerRow.appendChild(th);
          return;
        }

        th.classList.add('sortable');

        if (currentSource.key === 'signUps') {
          th.textContent = getSignUpsHeaderLabel(col);
          th.classList.add('abbr-head');
          th.setAttribute('data-full-label', getSignUpsHeaderFullLabel(col));
        } else {
          th.textContent = getColumnHeaderLabel(col);
        }

        if (sortState.column === col) {
          th.classList.add(sortState.direction === 'asc' ? 'sort-asc' : 'sort-desc');
        }

        th.addEventListener('click', async () => {
          if (sortState.column === col) {
            sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
          } else {
            sortState.column = col;
            sortState.direction = 'asc';
          }

          renderSortableHeader();
          await renderTableBody(getSortedRows(currentRows));
        });

        headerRow.appendChild(th);
      });

      if (useTeamDropdownRows()) {
        const checkTh = document.createElement('th');
        checkTh.textContent = 'CHECK TEAM';
        headerRow.appendChild(checkTh);
      }
    }

    async function renderTable(rows, forceReload = false) {
      showNormalTable();

      if (!Array.isArray(rows) || rows.length === 0) {
        currentRows = [];
        currentColumns = [];
        currentNumericColumns = new Set();
        tbody.innerHTML = '';
        headerRow.innerHTML = '';
        emptyMessage.style.display = 'block';
        rowCounter.textContent = '';
        return;
      }

      emptyMessage.style.display = 'none';

      currentRows = currentSource.key === 'bannedPlayers'
        ? rows
        : rows.map(applyTeamNameChangesToRow);

      currentColumns = getColumns(currentRows);
      currentNumericColumns = new Set(
        currentColumns.filter(col =>
          col !== 'fullLicenseCount' &&
          col !== 'signupIssue' &&
          isNumericColumn(currentRows.map(r => {
            if (col === 'fullLicenseCount') return getFullLicenseCount(r);
            return r[col];
          }))
        )
      );
      currentNumericColumns.add('fullLicenseCount');

      if (currentSource.key === 'signUps') {
        rowCounter.textContent = `Anmälda lag: ${currentRows.length}`;
      } else if (currentSource.key === 'bannedPlayers') {
        const activeCount = currentRows.filter(row => row.active === 'Yes').length;
        const violationCount = currentRows.filter(row => row.status === 'Violation').length;
        rowCounter.textContent = `Bans: ${currentRows.length} • Active: ${activeCount} • Violations: ${violationCount}`;
      } else {
        rowCounter.textContent = '';
      }

      renderSortableHeader();
      await renderTableBody(getSortedRows(currentRows), forceReload);
    }

    async function loadRegisteredTeams(forceReload = false) {
      const allData = await fetchAllaData(forceReload);
      return getRowsForSource(allData, 'signUps').map(applyTeamNameChangesToRow);
    }

    async function loadData(forceReload = false) {
      clearError();
      setStatus('Loading data...');
      reloadBtn.disabled = true;
      pageTitle.textContent = currentSource.label;

      try {
        if (forceReload) {
          signUpsCache = null;
          teamLinkMapCache = null;
          playerLinkMapCache = null;
          captainUserIdMapCache = null;
          bannedPlayersCache = null;
        }

        if (currentSource.type === 'preset') {
          const registeredRows = await loadRegisteredTeams(forceReload);
          await renderPresetSections(registeredRows, forceReload);
          setStatus('Done');
          lastUpdated.textContent = 'Last updated: ' + new Date().toLocaleString('en-GB');
          return;
        }

        sortState = { column: null, direction: 'asc' };
        const allData = await fetchAllaData(forceReload);

        if (currentSource.type === 'proqualreqcheck') {
          const rows = getProQualReqCheckRows(allData);
          await renderProQualReqCheck(rows, forceReload);
          setStatus('Done');
          lastUpdated.textContent = 'Last updated: ' + new Date().toLocaleString('en-GB');
          return;
        }

        if (currentSource.type === 'banned') {
          const rows = await buildBannedPlayersRows(forceReload);
          await renderTable(rows, forceReload);
          setStatus('Done');
          lastUpdated.textContent = 'Last updated: ' + new Date().toLocaleString('en-GB');
          return;
        }

        const rows = getRowsForSource(allData, currentSource.key).map(applyTeamNameChangesToRow);
        await renderTable(rows, forceReload);
        setStatus('Done');
        lastUpdated.textContent = 'Last updated: ' + new Date().toLocaleString('en-GB');
      } catch (err) {
        console.error(err);
        tbody.innerHTML = '';
        headerRow.innerHTML = '';
        seedingBody.innerHTML = '';
        proQualReqWrap.innerHTML = '';
        currentRows = [];
        currentColumns = [];
        currentNumericColumns = new Set();
        emptyMessage.style.display = 'none';
        rowCounter.textContent = '';
        showNormalTable();
        showError('Could not load data: ' + err.message);
        setStatus('Error');
      } finally {
        reloadBtn.disabled = false;
      }
    }

    mobileMenuBtn.addEventListener('click', openMobileMenu);
    mobileCloseBtn.addEventListener('click', closeMobileMenu);

    mobileTabsPanel.addEventListener('click', (e) => {
      if (e.target === mobileTabsPanel) closeMobileMenu();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeMobileMenu();
    });

    reloadBtn.addEventListener('click', () => {
      allaDataCache = null;
      signUpsCache = null;
      teamLinkMapCache = null;
      playerLinkMapCache = null;
      captainUserIdMapCache = null;
      bannedPlayersCache = null;
      loadData(true);
    });

    renderTabs();
    loadData();
  </script>
</body>
</html>
