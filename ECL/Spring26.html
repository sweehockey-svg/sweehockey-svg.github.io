<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>26 Spring Checks V2.4 — Dark Mode</title>
  <style>
    :root {
      --navy: #050b2b;
      --navy-2: #0a1238;
      --navy-3: #0e173f;
      --bg: #071022;
      --bg-2: #09152b;
      --panel: #0d1730;
      --panel-2: #111d38;
      --panel-3: #162442;
      --panel-soft: #0f1a33;
      --border: rgba(102, 132, 189, 0.18);
      --border-strong: rgba(132, 164, 224, 0.28);
      --text: #eef4ff;
      --muted: #93a4c3;
      --muted-2: #7183a6;
      --accent: #ff4f84;
      --accent-2: #ff6a97;
      --gold: #d8b44c;
      --gold-2: #f0cf73;
      --ok: #3ddc84;
      --danger: #ff6b7f;
      --warning: #f0c35b;
      --link: #d7e6ff;
      --thead: linear-gradient(90deg, #0a1035, #13204a);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.34);
      --shadow-soft: 0 8px 22px rgba(0, 0, 0, 0.22);

      --elite-bg: linear-gradient(90deg, #9d7a1f, #d5b14b 55%, #f2d67d);
      --elite-text: #091126;

      --pro-bg: linear-gradient(90deg, #7c848f, #b5bcc7 55%, #d9dee6);
      --pro-text: #081022;

      --lite-bg: linear-gradient(90deg, #7d432f, #ad654a 55%, #d68462);
      --lite-text: #ffffff;

      --core-bg: linear-gradient(90deg, #8b3200, #ca5a0a 55%, #ee7b17);
      --core-text: #ffffff;

      --neo-bg: linear-gradient(90deg, #22672a, #2f9640 55%, #4ed163);
      --neo-text: #ffffff;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      background:
        radial-gradient(circle at top center, rgba(214, 180, 76, 0.08), transparent 20%),
        radial-gradient(circle at left top, rgba(76, 111, 214, 0.08), transparent 28%),
        linear-gradient(180deg, #050c1b 0%, #071022 35%, #09152a 100%);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
      font-size: 13px;
    }

    .login-screen {
      position: fixed;
      inset: 0;
      z-index: 5000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background:
        radial-gradient(circle at top, rgba(240, 207, 115, 0.12), transparent 24%),
        linear-gradient(135deg, #05081d, #08112f 45%, #12071d 100%);
    }

    .login-screen.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 560px;
      background: rgba(12, 22, 45, 0.97);
      border: 1px solid var(--border-strong);
      border-radius: 22px;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.5);
      padding: 30px 26px;
      backdrop-filter: blur(8px);
    }

    .login-title {
      margin: 0 0 14px;
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #fff3c9;
    }

    .login-warning {
      margin: 0 0 22px;
      font-size: 14px;
      line-height: 1.55;
      color: var(--muted);
      font-weight: 700;
    }

    .login-warning strong { color: #ffd47c; }

    .login-label {
      display: block;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #dfe9ff;
    }

    .login-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .login-input {
      flex: 1 1 260px;
      min-width: 0;
      height: 48px;
      border: 1px solid var(--border-strong);
      border-radius: 12px;
      padding: 0 14px;
      font-size: 15px;
      font-weight: 700;
      outline: none;
      background: #0a1530;
      color: var(--text);
      transition: 0.15s ease;
    }

    .login-input::placeholder { color: #7f91b3; }

    .login-input:focus {
      border-color: rgba(240, 207, 115, 0.45);
      box-shadow: 0 0 0 3px rgba(240, 207, 115, 0.1);
    }

    .login-btn {
      height: 48px;
      border: 0;
      border-radius: 12px;
      padding: 0 18px;
      background: linear-gradient(180deg, var(--accent-2), var(--accent));
      color: white;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      cursor: pointer;
      box-shadow: 0 10px 22px rgba(255, 79, 132, 0.3);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .login-btn:hover {
      filter: brightness(1.03);
      transform: translateY(-1px);
    }

    .login-error {
      display: none;
      margin-top: 14px;
      padding: 11px 12px;
      border-radius: 12px;
      background: rgba(120, 25, 37, 0.25);
      border: 1px solid rgba(255, 107, 127, 0.35);
      color: #ff9cac;
      font-size: 13px;
      font-weight: 800;
    }

    .site-shell.locked { display: none; }

    .site-header {
      position: sticky;
      top: 0;
      z-index: 900;
      background: rgba(4, 10, 33, 0.96);
      color: white;
      border-bottom: 1px solid rgba(240, 207, 115, 0.15);
      box-shadow: 0 8px 22px rgba(0, 0, 0, 0.32);
      backdrop-filter: blur(8px);
    }

    .site-header-inner {
      max-width: 1320px;
      margin: 0 auto;
      padding: 16px 22px;
      display: flex;
      align-items: center;
      gap: 18px;
    }

    .site-header-topline { justify-content: flex-start; }

    .brand {
      font-size: 22px;
      font-weight: 900;
      font-style: italic;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      flex-shrink: 0;
      color: #ffffff;
    }

    .brand span { color: #d7def2; opacity: 0.9; }

    .site-header-titleblock {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .site-header-title {
      font-size: 22px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1;
      color: #ffffff;
    }

    .site-header-subtitle {
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.7px;
      text-transform: uppercase;
      opacity: 0.92;
      color: #91a5cb;
    }

    .mobile-menu-btn {
      display: none;
      margin-left: auto;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      color: white;
      border-radius: 12px;
      padding: 10px 13px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      cursor: pointer;
    }

    .page {
      max-width: 1320px;
      margin: 22px auto 34px;
      padding: 0 16px;
    }

    .page-card {
      background: linear-gradient(180deg, rgba(10, 20, 43, 0.98), rgba(9, 18, 39, 0.98));
      border: 1px solid var(--border);
      border-radius: 20px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .page-top {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--border);
      background:
        radial-gradient(circle at top, rgba(240, 207, 115, 0.05), transparent 25%),
        linear-gradient(to bottom, rgba(11, 23, 49, 0.98), rgba(10, 19, 40, 0.98));
    }

    h1 {
      margin: 0 0 14px 0;
      font-size: 30px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #f6f8ff;
      line-height: 1;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .tabs button {
      padding: 10px 13px;
      border: 1px solid var(--border);
      background: linear-gradient(to bottom, #101b36, #0d1730);
      color: #cdd9f3;
      cursor: pointer;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      line-height: 1.1;
      transition: 0.15s ease;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .tabs button:hover {
      background: #132142;
      border-color: rgba(240, 207, 115, 0.22);
      transform: translateY(-1px);
    }

    .tabs button.active {
      background: linear-gradient(to bottom, #1b2b5f, #101e49);
      color: #fff5cf;
      border-color: rgba(240, 207, 115, 0.35);
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.28);
    }

    .mobile-tabs-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(3, 7, 22, 0.72);
      backdrop-filter: blur(2px);
    }

    .mobile-tabs-panel.open { display: block; }

    .mobile-tabs-sheet {
      position: absolute;
      right: 0;
      top: 0;
      width: min(88vw, 360px);
      height: 100%;
      background: #0b1630;
      border-left: 1px solid var(--border);
      box-shadow: -10px 0 24px rgba(0, 0, 0, 0.32);
      display: flex;
      flex-direction: column;
    }

    .mobile-tabs-head {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      background: #0e1a37;
    }

    .mobile-tabs-title {
      font-size: 14px;
      font-weight: 900;
      text-transform: uppercase;
      color: #f6f8ff;
      letter-spacing: 0.5px;
    }

    .mobile-close-btn {
      border: 1px solid var(--border);
      background: #132142;
      color: #f1f5ff;
      border-radius: 10px;
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
    }

    .mobile-tabs-list {
      padding: 12px;
      display: grid;
      gap: 8px;
      overflow-y: auto;
    }

    .mobile-tab-btn {
      width: 100%;
      text-align: left;
      border: 1px solid var(--border);
      background: #101b36;
      color: #d3def7;
      border-radius: 10px;
      padding: 12px;
      font-size: 13px;
      font-weight: 800;
      text-transform: uppercase;
      line-height: 1.25;
      cursor: pointer;
    }

    .mobile-tab-btn.active {
      background: #182a5d;
      color: #fff4c5;
      border-color: rgba(240, 207, 115, 0.35);
    }

    .topbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding-top: 2px;
    }

    .filters-bar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .action-btn {
      padding: 10px 15px;
      border: 0;
      background: linear-gradient(to bottom, #ff6c96, #ff4f84);
      color: white;
      cursor: pointer;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      box-shadow: 0 10px 20px rgba(255, 90, 138, 0.26);
      transition: transform 0.12s ease, filter 0.12s ease;
    }

    .action-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.03);
    }

    .action-btn.secondary {
      background: linear-gradient(to bottom, #132142, #0e1831);
      color: #e8efff;
      border: 1px solid var(--border);
      box-shadow: none;
    }

    .search-input,
    .filter-select {
      height: 40px;
      min-width: 220px;
      border: 1px solid var(--border-strong);
      border-radius: 10px;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 700;
      outline: none;
      background: #0b1630;
      color: var(--text);
    }

    .search-input::placeholder { color: #7f91b3; }

    .search-input:focus,
    .filter-select:focus {
      border-color: rgba(240, 207, 115, 0.4);
      box-shadow: 0 0 0 3px rgba(240, 207, 115, 0.08);
    }

    .toggle-box {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 11px;
      background: #0e1933;
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 12px;
      font-weight: 800;
      color: #c0cdea;
      cursor: pointer;
      user-select: none;
    }

    .status {
      font-size: 12px;
      font-weight: 800;
      color: #dbe6fd;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      background: #0e1933;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 10px;
    }

    .small {
      font-size: 11px;
      color: var(--muted);
      background: #0e1933;
      border: 1px solid var(--border);
      padding: 8px 10px;
      border-radius: 10px;
    }

    .content-area {
      padding: 16px;
      background: linear-gradient(to bottom, #081224, #091427);
    }

    .table-wrap,
    .proqual-wrap {
      overflow-x: auto;
      background: linear-gradient(180deg, #0c1730, #0a1429);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
    }

    .section-wrap {
      overflow-x: auto;
      background: linear-gradient(180deg, #0c1730, #0a1429);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow-soft);
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 980px;
      font-size: 12px;
    }

    thead {
      background: var(--thead);
      color: white;
    }

    th, td {
      padding: 9px 10px;
      border-bottom: 1px solid rgba(124, 150, 202, 0.12);
      text-align: left;
      white-space: nowrap;
      line-height: 1.2;
      vertical-align: middle;
    }

    td { color: #e8efff; }

    th {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #f3f7ff;
    }

    #results thead th.sortable {
      cursor: pointer;
      user-select: none;
      position: relative;
      padding-right: 22px;
    }

    #results thead th.sortable::after {
      content: "↕";
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 11px;
      opacity: 0.7;
    }

    #results thead th.sort-asc::after { content: "▲"; opacity: 1; }
    #results thead th.sort-desc::after { content: "▼"; opacity: 1; }

    tbody tr:nth-child(even) { background: rgba(255,255,255,0.015); }
    tbody tr:hover { background: rgba(101, 136, 219, 0.08); }

    .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }

    tbody tr.not-ok { background: rgba(162, 31, 51, 0.28) !important; }
    tbody tr.not-ok:nth-child(even) { background: rgba(162, 31, 51, 0.32) !important; }
    tbody tr.not-ok:hover { background: rgba(184, 40, 62, 0.4) !important; }

    tbody tr.backup-warning { background: rgba(176, 132, 20, 0.22) !important; }
    tbody tr.backup-warning:nth-child(even) { background: rgba(176, 132, 20, 0.26) !important; }
    tbody tr.backup-warning:hover { background: rgba(201, 152, 24, 0.34) !important; }

    tbody tr.backup-danger,
    tbody tr.transfer-danger,
    tbody tr.signup-rule-error { background: rgba(153, 34, 48, 0.25) !important; }

    tbody tr.backup-danger:nth-child(even),
    tbody tr.transfer-danger:nth-child(even),
    tbody tr.signup-rule-error:nth-child(even) { background: rgba(153, 34, 48, 0.3) !important; }

    tbody tr.ban-clear { background: rgba(28, 102, 62, 0.16) !important; }
    tbody tr.ban-expired { background: rgba(255,255,255,0.02) !important; }

    .section-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      min-width: 960px;
      font-size: 12px;
    }

    .section-title-row td {
      color: #0b144f;
      font-weight: 900;
      text-align: center;
      border: 0;
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: 0.7px;
      padding: 12px 10px;
      border-radius: 12px 12px 0 0;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .seed-header-row th {
      background: var(--thead);
      color: white;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      padding: 9px 10px;
      text-align: left;
      border-bottom: 1px solid rgba(124, 150, 202, 0.12);
      white-space: nowrap;
    }

    .seed-row td {
      border-bottom: 1px solid rgba(124, 150, 202, 0.1);
      padding: 10px 10px;
      background: #0e1933;
      line-height: 1.2;
      vertical-align: middle;
      color: #e8efff;
    }

    .seed-row.unlisted td { background: #101d39 !important; }
    .seed-row.missing td { background: rgba(140, 30, 45, 0.25) !important; }
    .seed-row.disbanded td { background: rgba(170, 44, 44, 0.34) !important; }
    .seed-row.note td:nth-child(5) { color: #ffd98d; }

    .seed-status {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 92px;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      border: 1px solid transparent;
    }

    .seed-status.ok {
      background: rgba(61, 220, 132, 0.14);
      color: #72ecaa;
      border-color: rgba(61, 220, 132, 0.28);
    }

    .seed-status.missing {
      background: rgba(255, 107, 127, 0.12);
      color: #ff9cab;
      border-color: rgba(255, 107, 127, 0.25);
    }

    .seed-status.disbanded {
      background: #8e1f31;
      color: white;
      border-color: #a5283d;
    }

    .seed-status.empty {
      background: rgba(255,255,255,0.03);
      color: #8fa2c4;
      border-color: rgba(255,255,255,0.08);
    }

    .seed-note-badge {
      display: inline-block;
      padding: 5px 9px;
      border-radius: 999px;
      background: rgba(216, 180, 76, 0.14);
      color: #ffd98a;
      border: 1px solid rgba(216, 180, 76, 0.24);
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      margin-right: 6px;
      margin-bottom: 4px;
    }

    .seed-note-badge.disbanded {
      background: #8e1f31;
      color: white;
      border-color: #a5283d;
    }

    .error {
      color: #ffb3bf;
      font-weight: 800;
      margin-top: 12px;
      font-size: 12px;
      background: rgba(120, 25, 37, 0.2);
      border: 1px solid rgba(255, 107, 127, 0.24);
      padding: 11px 12px;
      border-radius: 12px;
    }

    .empty {
      padding: 18px;
      color: #91a5cb;
      font-size: 12px;
    }

    .cell-link,
    .seed-link,
    .proqual-link {
      color: #eef4ff;
      text-decoration: none;
      font-weight: 800;
    }

    .cell-link:hover,
    .seed-link:hover,
    .proqual-link:hover {
      text-decoration: underline;
      color: #fff4c9;
    }

    .icon-actions {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 34px;
    }

    .mail-icon-btn,
    .copy-icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 10px;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      background: linear-gradient(to bottom, #ff6c96, #ff4f84);
      color: white;
      box-shadow: 0 10px 18px rgba(255, 90, 138, 0.22);
      transition: transform 0.12s ease, filter 0.12s ease;
      font-size: 16px;
      line-height: 1;
    }

    .team-dropdown-panel {
      padding: 16px;
      background: #0b1630;
      border-top: 1px solid rgba(124, 150, 202, 0.14);
    }

    .team-rich-panel {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .team-rich-summary {
      background: linear-gradient(180deg, #101b36, #0d1730);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.18);
    }

    .team-rich-summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .team-rich-stat {
      background: #0f1a33;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .team-rich-stat-label {
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.45px;
      color: #8ea2c7;
      margin-bottom: 5px;
    }

    .team-rich-stat-value {
      font-size: 16px;
      font-weight: 900;
      color: #f3f7ff;
      line-height: 1.2;
    }

    .team-rich-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .team-rich-badge {
      display: inline-flex;
      align-items: center;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.35px;
      border: 1px solid var(--border);
      background: #111d38;
      color: #d6e2fb;
    }

    .team-rich-badge.flag {

      setStatus(text) {

      showError(text) {

        DOM.errorBox.textContent = text;

      clearCaches() {

          allaData: null,
          signUpsMap: null,
          teamLinkMap: null,
          playerLinkMap: null,
          captainUserIdMap: null,
          bannedPlayersRows: null
        };

      normalizeTeamName(value) {
        return String(value ?? '')
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, ' ')
          .replace(/[^\p{L}\p{N}]+/gu, ' ')
          .trim();
      },

      normalizePlayerName(value) {
        return String(value ?? '')
          .toLowerCase()
          .normalize('NFD')
          .replace(/[\u0300-\u036f]/g, '')
          .replace(/\s+/g, ' ')
          .trim();
      },

      createLink(url, text, className = 'cell-link') {
        const a = document.createElement('a');
        a.href = url;
        a.target = '_blank';
        a.rel = 'noopener noreferrer';
        a.className = className;
        a.textContent = text;
        return a;
      },

      escapeCsv(value) {
        const text = String(value ?? '');
        return `"${text.replace(/"/g, '""')}"`;
      },

      downloadFile(filename, content, mimeType = 'text/csv;charset=utf-8;') {
        const blob = new Blob([content], { type: mimeType });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(url);
      },

      toDisplayDate() {
        return new Date().toLocaleString('en-GB');
      },

      compareValues(a, b, isNumeric) {
        const aVal = a === null || a === undefined ? '' : a;
        const bVal = b === null || b === undefined ? '' : b;

        if (isNumeric) {
          const aNum = aVal === '' ? Number.NEGATIVE_INFINITY : Number(aVal);
          const bNum = bVal === '' ? Number.NEGATIVE_INFINITY : Number(bVal);
          return aNum - bNum;
        }

        return String(aVal).localeCompare(String(bVal), 'en', {
          numeric: true,
          sensitivity: 'base'
        });
      },

      safeNumber(value) {
        const num = Number(value);
        return Number.isFinite(num) ? num : 0;
      },

      joinNonEmpty(parts, separator = ' • ') {
        return parts.filter(Boolean).join(separator);
      },

      createEmptyValueNode() {

    const Rename = {

        TEAM_NAME_CHANGES.flatMap(item => {
          const oldNormalized = Utils.normalizeTeamName(item.oldName);
          const newNormalized = Utils.normalizeTeamName(item.newName);
          return [
            [oldNormalized, item],
            [newNormalized, item]
          ];
        })
      ),

      getRenameInfo(teamName) {
        return Rename.map.get(Utils.normalizeTeamName(teamName)) || null;

      getCanonicalTeamName(teamName) {
        const info = Rename.getRenameInfo(teamName);

      getSeedRenameNote(teamName) {
        const info = Rename.getRenameInfo(teamName);
        return info ? `Old name ${info.oldName}` : '';
      },

      applyToValue(value) {
        const info = Rename.getRenameInfo(value);
        return info ? info.newName : String(value || '');
      },

      applyToRow(row) {
        if (!row || typeof row !== 'object') return row;
        const cloned = { ...row };

        TEAM_NAME_KEYS.forEach(key => {
          if (key in cloned && cloned[key]) cloned[key] = Rename.applyToValue(cloned[key]);
        });

        ['history1Team', 'history2Team', 'history3Team', 'From', 'To'].forEach(key => {
          if (key in cloned && cloned[key]) cloned[key] = Rename.applyToValue(cloned[key]);
        });

        if (Array.isArray(cloned.players)) {
          cloned.players = cloned.players.map(player => {
            if (!player || typeof player !== 'object') return player;
            const playerClone = { ...player };
            ['history1Team', 'history2Team', 'history3Team'].forEach(key => {
              if (playerClone[key]) playerClone[key] = Rename.applyToValue(playerClone[key]);
            });
            return playerClone;
          });
        }

        return cloned;
      }

    const DataService = {
      unwrapAllaData(data) {
        if (data && typeof data === 'object' && Array.isArray(data.backups)) return data;

        const wrappedJsonString = data?.rows?.[0]?.json_result;
        if (typeof wrappedJsonString === 'string') {
          try {
            const parsedInner = JSON.parse(wrappedJsonString);
            if (parsedInner && typeof parsedInner === 'object') return parsedInner;
          } catch {
            throw new Error('json_result in alla.json is not valid JSON');
          }
        }

        return data;
      },

      async fetchAllaData(forceReload = false) {
        if (STATE.cache.allaData && !forceReload) return STATE.cache.allaData;

        const res = await fetch(CONFIG.DATA_FILE + '?ts=' + Date.now(), { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP error ' + res.status + ' for ' + CONFIG.DATA_FILE);

        const text = await res.text();
        let data;
        try {
          data = JSON.parse(text);
        } catch {
          throw new Error('Invalid JSON in ' + CONFIG.DATA_FILE);
        }

        STATE.cache.allaData = this.unwrapAllaData(data);
        return STATE.cache.allaData;
      },

      getRowsForSource(allData, sourceKey) {
        const rows = allData?.[sourceKey];
        if (!Array.isArray(rows)) {
          throw new Error(`Key "${sourceKey}" is missing or is not an array in ${CONFIG.DATA_FILE}`);
        }
        return rows;
      },

      async getSignUpsMap(forceReload = false) {
        if (STATE.cache.signUpsMap && !forceReload) return STATE.cache.signUpsMap;

        const allData = await this.fetchAllaData(forceReload);
        const signUps = this.getRowsForSource(allData, 'signUps');
        const map = new Map();

        signUps.forEach(originalRow => {
          const row = Rename.applyToRow(originalRow);
          const normalized = Utils.normalizeTeamName(RowAccess.getTeamName(row));
          if (normalized) map.set(normalized, row);
        });

        STATE.cache.signUpsMap = map;
        return map;
      },

      async getTeamLinkMap(forceReload = false) {
        if (STATE.cache.teamLinkMap && !forceReload) return STATE.cache.teamLinkMap;

        const allData = await this.fetchAllaData(forceReload);
        const map = new Map();

        Object.values(allData || {}).forEach(value => {
          if (!Array.isArray(value)) return;

          value.forEach(originalRow => {
            const row = Rename.applyToRow(originalRow);

            const possibleTeamIdKeys = [
              'teamID', 'teamId', 'TeamID', 'team_id',
              'fromTeamID', 'fromTeamId', 'toTeamID', 'toTeamId',
              'FromTeamID', 'ToTeamID'
            ];

            const possibleTeamNameKeys = ['teamName', 'Team', 'team', 'name', 'lag', 'Lag', 'clubName', 'From', 'To'];

            possibleTeamIdKeys.forEach(idKey => {
              const idValue = row?.[idKey];
              if (!idValue) return;

              possibleTeamNameKeys.forEach(nameKey => {
                const nameValue = row?.[nameKey];
                const normalized = Utils.normalizeTeamName(nameValue);
                if (normalized && !map.has(normalized)) map.set(normalized, String(idValue));
              });
            });

            const fallbackTeamId = row?.teamID || row?.teamId || row?.TeamID || row?.team_id;
            const fallbackTeamName = RowAccess.getTeamName(row);
            const fallbackNormalized = Utils.normalizeTeamName(fallbackTeamName);

            if (fallbackTeamId && fallbackNormalized && !map.has(fallbackNormalized)) {
              map.set(fallbackNormalized, String(fallbackTeamId));
            }
          });
        });

        const signUpsMap = await this.getSignUpsMap(forceReload);
        signUpsMap.forEach((row, normalized) => {
          if (row?.teamID && !map.has(normalized)) map.set(normalized, String(row.teamID));
        });

        STATE.cache.teamLinkMap = map;
        return map;
      },

      async getPlayerLinkMap(forceReload = false) {
        if (STATE.cache.playerLinkMap && !forceReload) return STATE.cache.playerLinkMap;

        const allData = await this.fetchAllaData(forceReload);
        const map = new Map();

        Object.values(allData || {}).forEach(value => {
          if (!Array.isArray(value)) return;

          value.forEach(row => {
            const playerId = row?.playerID || row?.playerId || row?.PlayerID || row?.player_id;
            if (!playerId) return;

            ['Player', 'tag', 'playerName', 'player'].forEach(nameKey => {
              const playerName = row?.[nameKey];
              const normalized = Utils.normalizePlayerName(playerName);
              if (normalized && !map.has(normalized)) map.set(normalized, String(playerId));
            });

            if (Array.isArray(row?.players)) {
              row.players.forEach(player => {
                const playerIdInner = player?.playerID || player?.playerId || '';
                const playerNameInner = player?.playerName || player?.Player || player?.tag || '';
                const normalizedInner = Utils.normalizePlayerName(playerNameInner);
                if (playerIdInner && normalizedInner && !map.has(normalizedInner)) {
                  map.set(normalizedInner, String(playerIdInner));
                }
              });
            }
          });
        });

        STATE.cache.playerLinkMap = map;
        return map;
      }

      getBackupGames(row) {
        const keys = ['totalMatchesPlayed', 'TotalGames26Winter', 'totalGames26Winter', 'matchesPlayed', 'gamesPlayed'];

      getFullLicenseCount(row) {
        const playerCount = Number(row?.playerCount) || 0;

        return playerCount - backupLicenseCount - unlicensedPlayerCount;

      getSearchableText(row) {
        const baseText = Object.values(row || {})
          .filter(value => !Array.isArray(value) && typeof value !== 'object')

          .join(' ');

        const playerText = Array.isArray(row?.players)
          ? row.players.map(player =>

        return `${baseText} ${playerText}`.trim();

    const Rules = {
      normalizeBanType(value) {
        const raw = String(value || '').trim().toLowerCase();
        if (raw.includes('suspension')) return 'Suspension';
        if (raw.includes('capt')) return 'Captaincy ban';
        return String(value || '').trim();
      },

      parseBanEndDate(value) {
        const text = String(value || '').trim();
        const dmy = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
        const ymd = text.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);

        if (dmy) {
          const [, day, month, year] = dmy;
          return new Date(Number(year), Number(month) - 1, Number(day), 23, 59, 59, 999);
        }

        if (ymd) {
          const [, year, month, day] = ymd;
          return new Date(Number(year), Number(month) - 1, Number(day), 23, 59, 59, 999);
        }

        return null;
      },

      isBanActive(untilValue) {
        const text = String(untilValue || '').trim().toLowerCase();
        if (!text) return true;
        if (text.includes('indefinitely')) return true;
        if (text.includes('undefined')) return true;
        if (text.includes('until the end')) return true;

        const endDate = this.parseBanEndDate(untilValue);
        if (!endDate) return true;
        return endDate >= new Date();
      },

      getDivisionLevel(value) {
        const division = String(value || '').trim().toUpperCase();
        if (division === 'ELITE') return 4;
        if (division === 'PRO') return 3;
        if (division === 'LITE') return 2;
        if (division === 'CORE') return 1;
        if (division === 'NEO') return 0;
        return null;
      },

      isBigDropTransfer(row) {
        if (STATE.currentSource.key !== 'overgangar') return false;
        const fromLevel = this.getDivisionLevel(row?.FromDiv);
        const toLevel = this.getDivisionLevel(row?.ToDiv);
        if (fromLevel === null || toLevel === null) return false;
        return (fromLevel - toLevel) > 1;

      isCompatibilityNotOk(row) {
        return String(row?.compatibility ?? '').trim().toLowerCase() === 'not ok';

      isNotOkRow(row) {
        return Object.values(row || {}).some(value =>
          String(value ?? '').trim().toLowerCase() === 'not ok'

      getMinimumPlayersForDivision(divisionName) {
        const division = String(divisionName || '').trim().toUpperCase();
        if (division === 'ELITE' || division === 'PRO') return 7;
        if (division === 'LITE' || division === 'CORE' || division === 'NEO') return 8;
        return 0;
      },

      getSignupIssues(row) {
        const issues = [];
        const division = String(row?.divisionName || '').trim().toUpperCase();
        const playerCount = Number(row?.playerCount) || 0;
        const fullLicenseCount = RowAccess.getFullLicenseCount(row);
        const backupLicenseCount = Number(row?.backupLicenseCount) || 0;
        const minPlayers = this.getMinimumPlayersForDivision(division);

        if (minPlayers > 0 && playerCount < minPlayers) {
          issues.push(`needs ${minPlayers - playerCount} more player${minPlayers - playerCount === 1 ? '' : 's'} (min ${minPlayers})`);
        }

        if (playerCount > 13) {
          issues.push(`has ${playerCount - 13} player${playerCount - 13 === 1 ? '' : 's'} too many (max 13)`);
        }

        if (fullLicenseCount < 6) {
          issues.push(`needs ${6 - fullLicenseCount} more full license${6 - fullLicenseCount === 1 ? '' : 's'} (min 6)`);
        }

        if (backupLicenseCount > 3) {
          issues.push(`has ${backupLicenseCount - 3} backup license${backupLicenseCount - 3 === 1 ? '' : 's'} too many (max 3)`);
        }

        return issues;
      },

      getSignupIssueText(row) {
        return this.getSignupIssues(row).join(' • ');
      },

      getRowClass(row) {
        if (STATE.currentSource.key === 'bannedPlayers') {
          if (String(row?.status || '').toLowerCase() === 'violation') return 'not-ok';
          if (String(row?.status || '').toLowerCase() === 'clear') return 'ban-clear';
          if (String(row?.status || '').toLowerCase() === 'expired') return 'ban-expired';
          return '';

        if (STATE.currentSource.key === 'signUps' && this.getSignupIssues(row).length > 0) return 'signup-rule-error';

if (STATE.currentSource.key === 'backups') {
  const games = RowAccess.getBackupGames(row);

    if (games === 10) return 'backup-warning';
  }
}

if (STATE.currentSource.key === 'licenslosa') {
  const games = RowAccess.getBackupGames(row);
  if (games !== null && games >= 1) {
    return 'not-ok';
  }
}

        if (this.isBigDropTransfer(row)) return 'transfer-danger';

      getAllowedHistoryMaxLevel() {
        if (STATE.currentSource.key === 'lite') return 2;

        return 99;

        const level = this.getDivisionLevel(divisionName);
        if (level === null) return false;

      getTeamCheckBadges(row) {
        const badges = [];

        if (division) badges.push({ text: division, className: 'team-rich-badge' });

          if (!query) return true;
          return RowAccess.getSearchableText(row).includes(query);
        });

      getFilteredSeedingRows(sectionTitle, rows) {
        const query = DOM.searchInput.value.trim().toLowerCase();
        const mode = DOM.seedingFilterSelect.value;

        return rows.filter(item => {
          const haystack = [
            item.seed,
            item.team,
            item.note,
            item.statusText,
            sectionTitle
          ].join(' ').toLowerCase();

          if (query && !haystack.includes(query)) return false;

          if (mode === 'all') return true;
          if (mode === 'missing') return item.isMissing;
          if (mode === 'disbanded') return item.isDisbanded;
          if (mode === 'wrongDivision') return item.note.includes('SIGNED UP TO');
          if (mode === 'proQualReq') return item.note.includes('PRO QUAL REQ') || item.note.includes('PRO QUAL SIGNUP');
          if (mode === 'eliteQualReq') return item.note.includes('ELITE QUAL REQ');

        return [...rows].sort((a, b) => {
          let aValue = STATE.sortState.column === 'fullLicenseCount'
            ? RowAccess.getFullLicenseCount(a)
            : a?.[STATE.sortState.column];

          let bValue = STATE.sortState.column === 'fullLicenseCount'
            ? RowAccess.getFullLicenseCount(b)
            : b?.[STATE.sortState.column];

          if (STATE.sortState.column === 'signupIssue') {
            aValue = Rules.getSignupIssueText(a);
            bValue = Rules.getSignupIssueText(b);
          }

          const result = Utils.compareValues(aValue, bValue, isNumeric);
          return STATE.sortState.direction === 'asc' ? result : -result;
        });
      }

    const SeedingService = {
      getSeedingTeamStatus(teamName) {
        const normalizedTeam = Utils.normalizeTeamName(teamName);
        for (const [name, status] of Object.entries(SEEDING_TEAM_STATUSES)) {
          if (Utils.normalizeTeamName(name) === normalizedTeam) return String(status || '').trim().toUpperCase();
        }
        return '';
      },

      detectSectionDivision(sectionTitle) {
        const title = String(sectionTitle || '').toLowerCase();
        if (title === 'elite') return 'ELITE';
        if (title === 'pro') return 'PRO';
        if (title === 'lite') return 'LITE';
        if (title === 'core') return 'CORE';
        if (title === 'neo') return 'NEO';
        if (title.startsWith('elite qualifiers')) return 'ELITE_QUAL';
        if (title.startsWith('pro qualifiers')) return 'PRO_QUAL';
        return '';
      },

      getSectionStyleKey(title) {
        const normalizedTitle = String(title || '').toLowerCase();
        if (normalizedTitle === 'elite') return 'elite';
        if (normalizedTitle.startsWith('elite qualifiers')) return 'eliteQual';
        if (normalizedTitle === 'pro') return 'pro';
        if (normalizedTitle === 'pro qualifiers') return 'proQual';
        if (normalizedTitle === 'lite') return 'lite';
        if (normalizedTitle === 'core') return 'core';
        if (normalizedTitle === 'neo') return 'neo';
        return 'elite';
      },

      collectPresetTeamNames() {
        const set = new Set();
        PRESET_SECTIONS.forEach(section => {
          section.rows.forEach(row => {
            const normalized = Utils.normalizeTeamName(Rename.getCanonicalTeamName(row[2]));
            if (normalized) set.add(normalized);
          });
        });
        return set;
      },

      collectLiteListedTeams() {
        const set = new Set();
        const liteSection = PRESET_SECTIONS.find(section => section.title === 'Lite');
        if (!liteSection) return set;
        liteSection.rows.forEach(row => {
          const normalized = Utils.normalizeTeamName(Rename.getCanonicalTeamName(row[2]));
          if (normalized) set.add(normalized);
        });
        return set;
      },

      collectProQualifierListedTeams() {
        const set = new Set();
        const proQualSection = PRESET_SECTIONS.find(section => section.title === 'Pro Qualifiers');
        if (!proQualSection) return set;
        proQualSection.rows.forEach(row => {
          const normalized = Utils.normalizeTeamName(Rename.getCanonicalTeamName(row[2]));
          if (normalized) set.add(normalized);
        });
        return set;
      },

      getQualifierNote(row) {
        const qualifier = String(row?.qualifierName || '').trim().toUpperCase();
        if (qualifier.includes('PRO QUALIFIER')) return 'PRO QUAL SIGNUP';
        if (qualifier.includes('ELITE QUALIFIER')) return 'ELITE QUAL REQ';
        if (qualifier.includes('WILDCARD')) return 'PRO QUAL REQ';
        return '';
      },

      buildRegisteredTeamInfoMap(registeredRows) {
        const map = new Map();
        registeredRows.forEach(row => {
          const normalized = Utils.normalizeTeamName(RowAccess.getTeamName(row));
          if (normalized) map.set(normalized, row);
        });
        return map;
      },

      getSeedRowNote(section, teamName, registeredInfoMap) {
        const canonicalTeamName = Rename.getCanonicalTeamName(teamName);
        const normalized = Utils.normalizeTeamName(canonicalTeamName);
        if (!normalized) return '';

        const row = registeredInfoMap.get(normalized);
        const notes = [];

        const renameNote = Rename.getSeedRenameNote(teamName);
        if (renameNote) notes.push(renameNote);

        if (!row) return notes.join(' • ');

        const listedDivision = this.detectSectionDivision(section.title);
        const signedDivision = String(row.divisionName || '').trim().toUpperCase();

        const qualifierNote = this.getQualifierNote(row);
        if (qualifierNote) notes.push(qualifierNote);

        if (
          signedDivision &&
          ['ELITE', 'PRO', 'LITE', 'CORE', 'NEO'].includes(listedDivision) &&
          signedDivision !== listedDivision &&
          !(listedDivision === 'CORE' && signedDivision === 'NEO')
        ) {
          notes.push('SIGNED UP TO ' + signedDivision);
        }

        return notes.join(' • ');
      },

      buildUnseededByDivision(registeredRows) {
        const listedTeams = this.collectPresetTeamNames();
        const result = { LITE: [], CORE: [], NEO: [] };

        registeredRows.forEach(row => {
          const teamName = RowAccess.getTeamName(row);
          const normalized = Utils.normalizeTeamName(teamName);
          const division = String(row.divisionName || '').trim().toUpperCase();

          if (!normalized || listedTeams.has(normalized)) return;
          if (!result[division]) return;

          result[division].push(row);
        });

        Object.keys(result).forEach(key => {
          result[key].sort((a, b) => String(a.teamName || '').localeCompare(String(b.teamName || ''), 'en'));
        });

        return result;
      },

      buildProQualifierExtraRows(registeredRows) {
        const listedInProQual = this.collectProQualifierListedTeams();

        const rows = registeredRows.filter(row => {
          const qualifierNote = this.getQualifierNote(row);
          const normalized = Utils.normalizeTeamName(RowAccess.getTeamName(row));
          return normalized && !listedInProQual.has(normalized) &&
            (qualifierNote === 'PRO QUAL SIGNUP' || qualifierNote === 'PRO QUAL REQ');
        });

        rows.sort((a, b) => {
          const aNote = this.getQualifierNote(a);
          const bNote = this.getQualifierNote(b);
          if (aNote !== bNote) return aNote.localeCompare(bNote, 'en');
          return String(a.teamName || '').localeCompare(String(b.teamName || ''), 'en');
        });

        return rows;
      },

      getLiteSignupCount(registeredInfoMap) {
        const liteListedTeams = this.collectLiteListedTeams();
        let count = 0;

        liteListedTeams.forEach(normalized => {
          const info = registeredInfoMap.get(normalized);
          if (!info) return;
          const note = this.getQualifierNote(info);
          if (note === 'PRO QUAL REQ') return;
          count++;
        });

        return count;
      },

      buildSignupCounts(registeredRows, registeredInfoMap, proQualifierExtraRows) {
        const counts = {
          ELITE: 0,
          ELITE_QUAL: 0,
          PRO: 0,
          PRO_QUAL: 0,
          LITE: 0,
          CORE: 0,
          NEO: 0
        };

        registeredRows.forEach(row => {
          const division = String(row.divisionName || '').trim().toUpperCase();
          const qualifier = String(row.qualifierName || '').trim().toUpperCase();

          if (division === 'ELITE') counts.ELITE++;
          if (division === 'PRO') counts.PRO++;
          if (division === 'CORE') counts.CORE++;
          if (division === 'NEO') counts.NEO++;
          if (qualifier.includes('ELITE QUALIFIER')) counts.ELITE_QUAL++;
        });

        counts.LITE = this.getLiteSignupCount(registeredInfoMap);
        counts.PRO_QUAL = proQualifierExtraRows.length;

        return counts;
      },

      async buildSeedingSections(registeredRows, forceReload = false) {
        const registeredTeamSet = new Set(
          registeredRows.map(row => RowAccess.getTeamName(row)).map(name => Utils.normalizeTeamName(name)).filter(Boolean)
        );

        const registeredInfoMap = this.buildRegisteredTeamInfoMap(registeredRows);
        const signUpsMap = await DataService.getSignUpsMap(forceReload);
        const unseededByDivision = this.buildUnseededByDivision(registeredRows);
        const proQualifierExtraRows = this.buildProQualifierExtraRows(registeredRows);
        const signupCounts = this.buildSignupCounts(registeredRows, registeredInfoMap, proQualifierExtraRows);

        return PRESET_SECTIONS.map(section => {
          const sectionKey = this.detectSectionDivision(section.title);
          let count = signupCounts[sectionKey] ?? 0;
          const items = [];

          section.rows.forEach(row => {
            const [pos, seed, team] = row;
            const canonicalTeam = Rename.getCanonicalTeamName(team);
            const normalized = Utils.normalizeTeamName(canonicalTeam);
            const exists = team ? registeredTeamSet.has(normalized) : false;
            const note = team ? this.getSeedRowNote(section, team, registeredInfoMap) : '';
            const teamInfo = signUpsMap.get(normalized);
            const seedingStatus = this.getSeedingTeamStatus(canonicalTeam);
            const isDisbanded = seedingStatus === 'DISBANDED';

            items.push({
              pos,
              seed,
              team,
              displayTeam: canonicalTeam,
              exists,
              note,
              extraClass: '',
              teamID: teamInfo?.teamID || '',
              statusText: isDisbanded ? 'Disbanded' : exists ? 'Registered' : canonicalTeam ? 'Missing' : '-',
              isMissing: !!canonicalTeam && !exists && !isDisbanded,
              isDisbanded,
              isUnlisted: false
            });
          });

          if (section.title === 'Pro Qualifiers') {
            const listedProQualCount = section.rows.filter(row => {
              const team = Rename.getCanonicalTeamName(row[2]);
              const normalized = Utils.normalizeTeamName(team);
              const info = registeredInfoMap.get(normalized);
              const note = info ? this.getQualifierNote(info) : '';
              return note === 'PRO QUAL SIGNUP' || note === 'PRO QUAL REQ';
            }).length;

            count = listedProQualCount + proQualifierExtraRows.length;

            const startIndex = section.rows.length + 1;
            proQualifierExtraRows.forEach((row, idx) => {
              items.push({
                pos: startIndex + idx,
                seed: 'Pro Qualifiers',
                team: row.teamName || '',
                displayTeam: Rename.getCanonicalTeamName(row.teamName || ''),
                exists: true,
                note: this.getSeedRowNote(section, row.teamName || '', registeredInfoMap),
                extraClass: 'unlisted',
                teamID: row.teamID || '',
                statusText: 'Registered',
                isMissing: false,
                isDisbanded: false,
                isUnlisted: true
              });
            });
          } else {
            const division = this.detectSectionDivision(section.title);
            const extraRows = ['LITE', 'CORE', 'NEO'].includes(division) ? unseededByDivision[division] : [];

            const startIndex = section.rows.length + 1;
            extraRows.forEach((row, idx) => {
              items.push({
                pos: startIndex + idx,
                seed: section.title + ' Unseeded',
                team: row.teamName || '',
                displayTeam: Rename.getCanonicalTeamName(row.teamName || ''),
                exists: true,
                note: this.getSeedRowNote(section, row.teamName || '', registeredInfoMap),
                extraClass: 'unlisted',
                teamID: row.teamID || '',
                statusText: 'Registered',
                isMissing: false,
                isDisbanded: false,
                isUnlisted: true
              });
            });
          }

          return {
            title: section.title,
            count,
            styleKey: this.getSectionStyleKey(section.title),
            items
          };
        });
      }
    };

    const BannedPlayersService = {
      async getCaptainUserIdMap(forceReload = false) {
        if (STATE.cache.captainUserIdMap && !forceReload) return STATE.cache.captainUserIdMap;

        const allData = await DataService.fetchAllaData(forceReload);

          if (!map.has(normalizedTeam)) map.set(normalizedTeam, []);

          if (!ids.includes(userId)) ids.push(userId);
        });

        STATE.cache.captainUserIdMap = map;
        return map;

      buildRoleDisplay(role) {
        const r = String(role || '').trim();
        if (!r) return '';
        if (r === 'Assistant Captain') return 'Assistant Captain';
        if (r === 'Captain') return 'Captain';
        return r;
      },

      buildPresenceRows(allData) {
        const rows = [];

        const teamCaptains = Array.isArray(allData?.teamCaptains) ? allData.teamCaptains : [];
        teamCaptains.forEach(originalRow => {
          const row = Rename.applyToRow(originalRow);
          const playerName = String(row.tag || '').trim();
          if (!playerName) return;

          rows.push({
            normalizedPlayer: Utils.normalizePlayerName(playerName),
            playerName,
            playerID: row.playerID || '',
            teamName: row.teamName || '',
            teamID: row.teamID || '',
            divisionName: '',
            sourceKey: 'teamCaptains',
            matchRole: this.buildRoleDisplay(row.Role || 'Captain')
          });
        });

        const playerSources = ['backups', 'licenslosa', 'overgangar', 'proQualReqCheck'];
        playerSources.forEach(sourceKey => {
          const sourceRows = Array.isArray(allData?.[sourceKey]) ? allData[sourceKey] : [];
          sourceRows.forEach(originalRow => {
            const row = Rename.applyToRow(originalRow);
            const playerName = String(row.Player || row.tag || '').trim();
            if (!playerName) return;

            rows.push({
              normalizedPlayer: Utils.normalizePlayerName(playerName),
              playerName,
              playerID: row.playerID || '',
              teamName: row.teamName || row.To || '',
              teamID: row.teamID || '',
              divisionName: row.divisionName || row.ToDiv || '',
              sourceKey,
              matchRole: 'Player'
            });
          });
        });

        return rows;
      },

      getPlayerAliases(entry) {
        return [entry.playerName, ...(entry.aliases || [])]
          .map(name => String(name || '').trim())
          .filter(Boolean);
      },

      getRelevantBanMatches(entry, presenceRows) {
        const aliases = this.getPlayerAliases(entry).map(name => Utils.normalizePlayerName(name));
        const active = Rules.isBanActive(entry.until);
        if (!active) return [];

        const normalizedType = Rules.normalizeBanType(entry.banType);

        return presenceRows.filter(match => {
          if (!aliases.includes(match.normalizedPlayer)) return false;

          if (normalizedType === 'Captaincy ban') {
            return match.matchRole === 'Captain' || match.matchRole === 'Assistant Captain';
          }

          if (normalizedType === 'Suspension') return true;
          return false;
        });
      },

      getUniqueJoined(values) {
        return [...new Set(values.map(v => String(v || '').trim()).filter(Boolean))].join(' | ');
      },

      findTeamIDForName(teamName, teamLinkMap) {
        return teamLinkMap.get(Utils.normalizeTeamName(teamName)) || '';
      },

      async buildRows(forceReload = false) {
        if (STATE.cache.bannedPlayersRows && !forceReload) return STATE.cache.bannedPlayersRows;

        const allData = await DataService.fetchAllaData(forceReload);
        const presenceRows = this.buildPresenceRows(allData);
        const teamLinkMap = await DataService.getTeamLinkMap(forceReload);

        const rows = BANNED_PLAYERS.map(entry => {
          const active = Rules.isBanActive(entry.until);
          const matches = this.getRelevantBanMatches(entry, presenceRows);

          const uniqueMatches = [];
          const seen = new Set();

          matches.forEach(match => {
            const key = [
              match.normalizedPlayer,
              Utils.normalizeTeamName(match.teamName),
              match.matchRole,
              match.sourceKey,
              match.divisionName
            ].join('__');

            if (!seen.has(key)) {
              seen.add(key);
              uniqueMatches.push(match);
            }
          });

          const teamValues = uniqueMatches.map(match => {
            const id = match.teamID || this.findTeamIDForName(match.teamName, teamLinkMap);
            return id ? `${match.teamName}|||${id}` : match.teamName;
          });

          return {
            playerName: entry.playerName,
            playerAliases: this.getPlayerAliases(entry).slice(1).join(', '),
            banType: Rules.normalizeBanType(entry.banType),
            until: entry.until,
            active: active ? 'Yes' : 'No',
            status: !active ? 'Expired' : uniqueMatches.length > 0 ? 'Violation' : 'Clear',

      async renderTableCell(td, row, col, forceReload = false) {
        let value = row[col] ?? '';
        if (col === 'fullLicenseCount') value = RowAccess.getFullLicenseCount(row);
        if (col === 'signupIssue') value = Rules.getSignupIssueText(row);

        const textValue = String(value ?? '');
        if (!textValue) {
          td.textContent = '';
          return;
        }

        const teamLinkMap = await DataService.getTeamLinkMap(forceReload);
        const playerLinkMap = await DataService.getPlayerLinkMap(forceReload);

        const directTeamID = row?.teamID || row?.teamId || row?.TeamID || row?.team_id;
        const directPlayerID = row?.playerID || row?.playerId || row?.PlayerID || row?.player_id;

        if (STATE.currentSource.key === 'bannedPlayers') {
          if (col === 'playerName') {
            const mappedPlayerID = playerLinkMap.get(Utils.normalizePlayerName(textValue));
            if (mappedPlayerID) {
              td.appendChild(Utils.createLink(PLAYER_BASE_URL + mappedPlayerID, textValue));
            } else {
              td.textContent = textValue;
            }

            if (row.playerAliases) {
              const alias = document.createElement('div');
              alias.style.marginTop = '4px';
              alias.style.fontSize = '11px';
              alias.style.color = '#8ea2c7';
              alias.style.whiteSpace = 'normal';
              alias.textContent = 'Alias: ' + row.playerAliases;
              td.appendChild(alias);
            }
            return;
          }

          if (col === 'teams') {
            const parts = textValue.split('|').map(part => part.trim()).filter(Boolean);
            parts.forEach((part, index) => {
              const [teamName, teamID] = part.split('|||');
              if (teamID) td.appendChild(Utils.createLink(TEAM_BASE_URL + teamID, teamName));
              else td.appendChild(document.createTextNode(teamName));
              if (index < parts.length - 1) td.appendChild(document.createTextNode(' | '));
            });
            return;
          }

          if (col === 'notes') td.style.whiteSpace = 'normal';
          td.textContent = textValue;
          return;
        }

        if (PLAYER_LIST_NAME_KEYS.includes(col)) {
          const parts = textValue.split(',').map(part => part.trim()).filter(Boolean);
          parts.forEach((part, index) => {
            const match = part.match(/^(.*?)(\s*\(\d+\))?$/);
            const nameOnly = (match?.[1] || part).trim();
            const normalized = Utils.normalizePlayerName(nameOnly);
            const playerID = playerLinkMap.get(normalized);

            if (playerID) td.appendChild(Utils.createLink(PLAYER_BASE_URL + playerID, part));
            else td.appendChild(document.createTextNode(part));

            if (index < parts.length - 1) td.appendChild(document.createTextNode(', '));
          });
          return;
        }

        if (['From', 'To', 'history1Team', 'history2Team', 'history3Team'].includes(col)) {
          td.textContent = textValue;
          return;
        }

        if (directTeamID && TEAM_NAME_KEYS.includes(col)) {
          td.appendChild(Utils.createLink(TEAM_BASE_URL + directTeamID, textValue));
          return;
        }

        if (directPlayerID && PLAYER_NAME_KEYS.includes(col)) {
          td.appendChild(Utils.createLink(PLAYER_BASE_URL + directPlayerID, textValue));
          return;
        }

        if (TEAM_NAME_KEYS.includes(col)) {
          const mappedTeamID = teamLinkMap.get(Utils.normalizeTeamName(textValue));
          if (mappedTeamID) {
            td.appendChild(Utils.createLink(TEAM_BASE_URL + mappedTeamID, textValue));
            return;
          }
        }

        if (PLAYER_NAME_KEYS.includes(col) || col === 'playerName') {
          const mappedPlayerID = playerLinkMap.get(Utils.normalizePlayerName(textValue));
          if (mappedPlayerID) {
            td.appendChild(Utils.createLink(PLAYER_BASE_URL + mappedPlayerID, textValue));
            return;
          }
        }

        const anyMappedPlayerID = playerLinkMap.get(Utils.normalizePlayerName(textValue));
        if (anyMappedPlayerID) {
          td.appendChild(Utils.createLink(PLAYER_BASE_URL + anyMappedPlayerID, textValue));
          return;
        }

        td.textContent = textValue;
      },
