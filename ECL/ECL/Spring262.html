    normalizeTeamName(value) {
      return String(value ?? '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .replace(/[^\p{L}\p{N}]+/gu, ' ')
        .trim();
    },

    normalizePlayerName(value) {
      return String(value ?? '')
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
    },

    createLink(url, text, className = 'cell-link') {
      const a = document.createElement('a');
      a.href = url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.className = className;
      a.textContent = text;
      return a;
    },

    escapeCsv(value) {
      const text = String(value ?? '');
      return `"${text.replace(/"/g, '""')}"`;
    },

    downloadFile(filename, content, mimeType = 'text/csv;charset=utf-8;') {
      const blob = new Blob([content], { type: mimeType });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    },

    toDisplayDate() {
      return new Date().toLocaleString('en-GB');
    },

    compareValues(a, b, isNumeric) {
      const aVal = a === null || a === undefined ? '' : a;
      const bVal = b === null || b === undefined ? '' : b;

      if (isNumeric) {
        const aNum = aVal === '' ? Number.NEGATIVE_INFINITY : Number(aVal);
        const bNum = bVal === '' ? Number.NEGATIVE_INFINITY : Number(bVal);
        return aNum - bNum;
      }

      return String(aVal).localeCompare(String(bVal), 'en', {
        numeric: true,
        sensitivity: 'base'
      });
    }
  };

  const Rename = {
    map: new Map(
      TEAM_NAME_CHANGES.flatMap(item => {
        const oldNormalized = Utils.normalizeTeamName(item.oldName);
        const newNormalized = Utils.normalizeTeamName(item.newName);
        return [
          [oldNormalized, item],
          [newNormalized, item]
        ];
      })
    ),

    getRenameInfo(teamName) {
      return Rename.map.get(Utils.normalizeTeamName(teamName)) || null;
    },

    getCanonicalTeamName(teamName) {
      const info = Rename.getRenameInfo(teamName);
      return info ? info.newName : String(teamName || '');
    },

    getSeedRenameNote(teamName) {
      const info = Rename.getRenameInfo(teamName);
      return info ? `Old name ${info.oldName}` : '';
    },

    applyToValue(value) {
      const info = Rename.getRenameInfo(value);
      return info ? info.newName : String(value || '');
    },

    applyToRow(row) {
      if (!row || typeof row !== 'object') return row;
      const cloned = { ...row };

      TEAM_NAME_KEYS.forEach(key => {
        if (key in cloned && cloned[key]) {
          cloned[key] = Rename.applyToValue(cloned[key]);
        }
      });

      ['history1Team', 'history2Team', 'history3Team', 'From', 'To'].forEach(key => {
        if (key in cloned && cloned[key]) {
          cloned[key] = Rename.applyToValue(cloned[key]);
        }
      });

      return cloned;
    }
  };

  const RowAccess = {
    getTeamName(row) {
      for (const key of TEAM_NAME_KEYS) {
        if (row && row[key]) return String(row[key]);
      }
      return '';
    },

    getPlayerId(row) {
      const keys = ['playerID', 'playerId', 'PlayerID', 'player_id'];
      for (const key of keys) if (row && row[key]) return row[key];
      return '';
    },

    getUserId(row) {
      const keys = ['userID', 'userId', 'UserID', 'user_id', 'userid'];
      for (const key of keys) {
        if (row && row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') return row[key];
      }
      return '';
    },

    getLeagueId(row) {
      const keys = ['leagueID', 'leagueId', 'LeagueID', 'league_id', 'ToLeagueID', 'toLeagueID', 'toLeagueId'];
      for (const key of keys) {
        if (row && row[key] !== undefined && row[key] !== null && String(row[key]).trim() !== '') return row[key];
      }
      return '';
    },

    getTeamMeta(row, context = 'default') {
      if (!row || typeof row !== 'object') return null;

      if (context === 'from') {
        const teamID = row.FromTeamID || row.fromTeamID || row.fromTeamId || '';
        const leagueID = row.FromLeagueID || row.fromLeagueID || row.fromLeagueId || '';
        const teamName = row.From || '';
        if (teamID && leagueID) return { teamID: String(teamID), leagueID: String(leagueID), teamName: String(teamName) };
      }

      if (context === 'to') {
        const teamID = row.ToTeamID || row.toTeamID || row.toTeamId || row.teamID || '';
        const leagueID = row.ToLeagueID || row.toLeagueID || row.toLeagueId || row.leagueID || '';
        const teamName = row.To || row.teamName || '';
        if (teamID && leagueID) return { teamID: String(teamID), leagueID: String(leagueID), teamName: String(teamName) };
      }

      const teamID = row.teamID || row.teamId || row.TeamID || row.team_id || '';
      const leagueID = row.leagueID || row.leagueId || row.LeagueID || row.league_id || '';
      const teamName = RowAccess.getTeamName(row);
      if (teamID && leagueID) return { teamID: String(teamID), leagueID: String(leagueID), teamName: String(teamName) };

      return null;
    },

    getBackupGames(row) {
      const keys = ['totalMatchesPlayed', 'TotalGames26Winter', 'totalGames26Winter', 'matchesPlayed', 'gamesPlayed'];
      for (const key of keys) {
        const num = Number(row?.[key]);
        if (isFinite(num)) return num;
      }
      return null;
    },

    getFullLicenseCount(row) {
      const playerCount = Number(row?.playerCount) || 0;
      const backupLicenseCount = Number(row?.backupLicenseCount) || 0;
      const unlicensedPlayerCount = Number(row?.unlicensedPlayerCount) || 0;
      return playerCount - backupLicenseCount - unlicensedPlayerCount;
    },

    getSearchableText(row) {
      return Object.values(row || {})
        .map(value => String(value ?? '').toLowerCase())
        .join(' ');
    }
  };

  const DataService = {
    unwrapAllaData(data) {
      if (data && typeof data === 'object' && Array.isArray(data.backups)) return data;

      const wrappedJsonString = data?.rows?.[0]?.json_result;
      if (typeof wrappedJsonString === 'string') {
        try {
          const parsedInner = JSON.parse(wrappedJsonString);
          if (parsedInner && typeof parsedInner === 'object') return parsedInner;
        } catch {
          throw new Error(`json_result in ${CONFIG.DATA_FILE} is not valid JSON`);
        }
      }

      return data;
    },

    async fetchAllaData(forceReload = false) {
      if (STATE.cache.allaData && !forceReload) return STATE.cache.allaData;

      const res = await fetch(CONFIG.DATA_FILE + '?ts=' + Date.now(), { cache: 'no-store' });
      if (!res.ok) throw new Error('HTTP error ' + res.status + ' for ' + CONFIG.DATA_FILE);

      const text = await res.text();
      let data;
      try {
        data = JSON.parse(text);
      } catch {
        throw new Error('Invalid JSON in ' + CONFIG.DATA_FILE);
      }

      STATE.cache.allaData = this.unwrapAllaData(data);
      return STATE.cache.allaData;
    },

    getRowsForSource(allData, sourceKey) {
      const rows = allData?.[sourceKey];
      if (!Array.isArray(rows)) {
        throw new Error(`Key "${sourceKey}" is missing or is not an array in ${CONFIG.DATA_FILE}`);
      }
      return rows;
    },

    async getSignUpsMap(forceReload = false) {
      if (STATE.cache.signUpsMap && !forceReload) return STATE.cache.signUpsMap;

      const allData = await this.fetchAllaData(forceReload);
      const signUps = this.getRowsForSource(allData, 'signUps');
      const map = new Map();

      signUps.forEach(originalRow => {
        const row = Rename.applyToRow(originalRow);
        const normalized = Utils.normalizeTeamName(RowAccess.getTeamName(row));
        if (normalized) map.set(normalized, row);
      });

      STATE.cache.signUpsMap = map;
      return map;
    },

    async getTeamLinkMap(forceReload = false) {
      if (STATE.cache.teamLinkMap && !forceReload) return STATE.cache.teamLinkMap;

      const allData = await this.fetchAllaData(forceReload);
      const map = new Map();

      const saveMeta = (teamName, teamID, leagueID) => {
        const normalized = Utils.normalizeTeamName(teamName);
        if (!normalized || !teamID || !leagueID) return;
        if (!map.has(normalized)) {
          map.set(normalized, {
            teamID: String(teamID),
            leagueID: String(leagueID),
            teamName: String(teamName || '')
          });
        }
      };

      Object.values(allData || {}).forEach(value => {
        if (!Array.isArray(value)) return;

        value.forEach(originalRow => {
          const row = Rename.applyToRow(originalRow);

          const defaultMeta = RowAccess.getTeamMeta(row);
          if (defaultMeta) saveMeta(defaultMeta.teamName, defaultMeta.teamID, defaultMeta.leagueID);

          const fromMeta = RowAccess.getTeamMeta(row, 'from');
          if (fromMeta) saveMeta(fromMeta.teamName, fromMeta.teamID, fromMeta.leagueID);

          const toMeta = RowAccess.getTeamMeta(row, 'to');
          if (toMeta) saveMeta(toMeta.teamName, toMeta.teamID, toMeta.leagueID);
        });
      });

      const signUpsMap = await this.getSignUpsMap(forceReload);
      signUpsMap.forEach((row, normalized) => {
        const meta = RowAccess.getTeamMeta(row);
        if (meta && !map.has(normalized)) {
          map.set(normalized, meta);
        }
      });

      STATE.cache.teamLinkMap = map;
      return map;
    },

    async getPlayerLinkMap(forceReload = false) {
      if (STATE.cache.playerLinkMap && !forceReload) return STATE.cache.playerLinkMap;

      const allData = await this.fetchAllaData(forceReload);
      const map = new Map();

      Object.values(allData || {}).forEach(value => {
        if (!Array.isArray(value)) return;

        value.forEach(row => {
          const playerId = row?.playerID || row?.playerId || row?.PlayerID || row?.player_id;
          if (!playerId) return;

          ['Player', 'tag', 'playerName', 'player'].forEach(nameKey => {
            const playerName = row?.[nameKey];
            const normalized = Utils.normalizePlayerName(playerName);
            if (normalized && !map.has(normalized)) map.set(normalized, String(playerId));
          });
        });
      });

      STATE.cache.playerLinkMap = map;
      return map;
    }
  };

  const Rules = {
    normalizeBanType(value) {
      const raw = String(value || '').trim().toLowerCase();
      if (raw.includes('suspension')) return 'Suspension';
      if (raw.includes('capt')) return 'Captaincy ban';
      return String(value || '').trim();
    },

    parseBanEndDate(value) {
      const text = String(value || '').trim();
      const dmy = text.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})$/);
      const ymd = text.match(/^(\d{4})\.(\d{1,2})\.(\d{1,2})$/);

      if (dmy) {
        const [, day, month, year] = dmy;
        return new Date(Number(year), Number(month) - 1, Number(day), 23, 59, 59, 999);
      }

      if (ymd) {
        const [, year, month, day] = ymd;
        return new Date(Number(year), Number(month) - 1, Number(day), 23, 59, 59, 999);
      }

      return null;
    },

    isBanActive(untilValue) {
      const text = String(untilValue || '').trim().toLowerCase();
      if (!text) return true;
      if (text.includes('indefinitely')) return true;
      if (text.includes('undefined')) return true;
      if (text.includes('until the end')) return true;

      const endDate = this.parseBanEndDate(untilValue);
      if (!endDate) return true;
      return endDate >= new Date();
    },

    getDivisionLevel(value) {
      const division = String(value || '').trim().toUpperCase();
      if (division === 'ELITE') return 4;
      if (division === 'PRO') return 3;
      if (division === 'LITE') return 2;
      if (division === 'CORE') return 1;
      if (division === 'NEO') return 0;
      return null;
    },

    isBigDropTransfer(row) {
      if (STATE.currentSource.key !== 'overgangar') return false;
      const fromLevel = this.getDivisionLevel(row?.FromDiv);
      const toLevel = this.getDivisionLevel(row?.ToDiv);
      if (fromLevel === null || toLevel === null) return false;
      return (fromLevel - toLevel) > 1;
    },

    isCompatibilityNotOk(row) {
      return String(row?.compatibility ?? '').trim().toLowerCase() === 'not ok';
    },

    isNotOkRow(row) {
      return Object.values(row || {}).some(value =>
        String(value ?? '').trim().toLowerCase() === 'not ok'
      );
    },

    getMinimumPlayersForDivision(divisionName) {
      const division = String(divisionName || '').trim().toUpperCase();
      if (division === 'ELITE' || division === 'PRO') return 7;
      if (division === 'LITE' || division === 'CORE' || division === 'NEO') return 8;
      return 0;
    },

    getSignupIssues(row) {
      const issues = [];
      const division = String(row?.divisionName || '').trim().toUpperCase();
      const playerCount = Number(row?.playerCount) || 0;
      const fullLicenseCount = RowAccess.getFullLicenseCount(row);
      const backupLicenseCount = Number(row?.backupLicenseCount) || 0;
      const minPlayers = this.getMinimumPlayersForDivision(division);

      if (minPlayers > 0 && playerCount < minPlayers) {
        issues.push(`needs ${minPlayers - playerCount} more player${minPlayers - playerCount === 1 ? '' : 's'} (min ${minPlayers})`);
      }

      if (playerCount > 13) {
        issues.push(`has ${playerCount - 13} player${playerCount - 13 === 1 ? '' : 's'} too many (max 13)`);
      }

      if (fullLicenseCount < 6) {
        issues.push(`needs ${6 - fullLicenseCount} more full license${6 - fullLicenseCount === 1 ? '' : 's'} (min 6)`);
      }

      if (backupLicenseCount > 3) {
        issues.push(`has ${backupLicenseCount - 3} backup license${backupLicenseCount - 3 === 1 ? '' : 's'} too many (max 3)`);
      }

      return issues;
    },

    getSignupIssueText(row) {
      return this.getSignupIssues(row).join(' • ');
    },

    getRowClass(row) {
      if (STATE.currentSource.key === 'bannedPlayers') {
        if (String(row?.status || '').toLowerCase() === 'violation') return 'not-ok';
        if (String(row?.status || '').toLowerCase() === 'clear') return 'ban-clear';
        if (String(row?.status || '').toLowerCase() === 'expired') return 'ban-expired';
        return '';
      }

      if (STATE.currentSource.key === 'signUps' && this.getSignupIssues(row).length > 0) return 'signup-rule-error';

      if (STATE.currentSource.key === 'backups') {
        const games = RowAccess.getBackupGames(row);
        if (games !== null) {
          if (games > 10) return 'backup-danger';
          if (games === 10) return 'backup-warning';
        }
      }

      if (this.isBigDropTransfer(row)) return 'transfer-danger';
      if (this.isNotOkRow(row)) return 'not-ok';
      return '';
    },

    isFlaggedRow(row) {
      const cls = this.getRowClass(row);
      return ['not-ok', 'backup-warning', 'backup-danger', 'transfer-danger', 'signup-rule-error'].includes(cls);
    }
  };

  const Filters = {
    getFilteredRows(rows) {
      const query = DOM.searchInput.value.trim().toLowerCase();
      const flaggedOnly = DOM.flaggedOnlyToggle.checked;

      return rows.filter(row => {
        if (flaggedOnly && !Rules.isFlaggedRow(row)) return false;
        if (!query) return true;
        return RowAccess.getSearchableText(row).includes(query);
      });
    },

    getFilteredSeedingRows(sectionTitle, rows) {
      const query = DOM.searchInput.value.trim().toLowerCase();
      const mode = DOM.seedingFilterSelect.value;

      return rows.filter(item => {
        const haystack = [
          item.seed,
          item.team,
          item.note,
          item.statusText,
          sectionTitle
        ].join(' ').toLowerCase();

        if (query && !haystack.includes(query)) return false;

        if (mode === 'all') return true;
        if (mode === 'missing') return item.isMissing;
        if (mode === 'disbanded') return item.isDisbanded;
        if (mode === 'wrongDivision') return item.note.includes('SIGNED UP TO');
        if (mode === 'proQualReq') return item.note.includes('PRO QUAL REQ') || item.note.includes('PRO QUAL SIGNUP');
        if (mode === 'eliteQualReq') return item.note.includes('ELITE QUAL REQ');

        return true;
      });
    }

      if (!this.canExportCurrentSource()) {
        Utils.setStatus('CSV not available for this tab');
        return;

      const rows = this.getExportableRows();
      const cols = this.getExportableColumns();
      const headers = cols.map(col => TableConfig.getColumnHeaderLabel(col));
      const lines = [headers.map(Utils.escapeCsv).join(',')];

      rows.forEach(row => {

      const filename = `${STATE.currentSource.key}-${new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-')}.csv`;

        const result = Utils.compareValues(aValue, bValue, isNumeric);

  const SeedingService = {
    getSeedingTeamStatus(teamName) {
      const normalizedTeam = Utils.normalizeTeamName(teamName);
      for (const [name, status] of Object.entries(SEEDING_TEAM_STATUSES)) {
        if (Utils.normalizeTeamName(name) === normalizedTeam) return String(status || '').trim().toUpperCase();
      }
      return '';
    },

    detectSectionDivision(sectionTitle) {
      const title = String(sectionTitle || '').toLowerCase();
      if (title === 'elite') return 'ELITE';
      if (title === 'pro') return 'PRO';
      if (title === 'lite') return 'LITE';
      if (title === 'core') return 'CORE';
      if (title === 'neo') return 'NEO';
      if (title.startsWith('elite qualifiers')) return 'ELITE_QUAL';
      if (title.startsWith('pro qualifiers')) return 'PRO_QUAL';
      return '';
    },

    getSectionStyleKey(title) {
      const normalizedTitle = String(title || '').toLowerCase();
      if (normalizedTitle === 'elite') return 'elite';
      if (normalizedTitle.startsWith('elite qualifiers')) return 'eliteQual';
      if (normalizedTitle === 'pro') return 'pro';
      if (normalizedTitle === 'pro qualifiers') return 'proQual';
      if (normalizedTitle === 'lite') return 'lite';
      if (normalizedTitle === 'core') return 'core';
      if (normalizedTitle === 'neo') return 'neo';
      return 'elite';
    },

    collectPresetTeamNames() {
      const set = new Set();
      PRESET_SECTIONS.forEach(section => {
        section.rows.forEach(row => {
          const normalized = Utils.normalizeTeamName(Rename.getCanonicalTeamName(row[2]));
          if (normalized) set.add(normalized);

    collectLiteListedTeams() {
      const set = new Set();
      const liteSection = PRESET_SECTIONS.find(section => section.title === 'Lite');
      if (!liteSection) return set;
      liteSection.rows.forEach(row => {
        const normalized = Utils.normalizeTeamName(Rename.getCanonicalTeamName(row[2]));

    collectProQualifierListedTeams() {
      const set = new Set();
      const proQualSection = PRESET_SECTIONS.find(section => section.title === 'Pro Qualifiers');
      if (!proQualSection) return set;
      proQualSection.rows.forEach(row => {
        const normalized = Utils.normalizeTeamName(Rename.getCanonicalTeamName(row[2]));
        if (normalized) set.add(normalized);
      });
      return set;
    },

    getQualifierNote(row) {
      const qualifier = String(row?.qualifierName || '').trim().toUpperCase();
      if (qualifier.includes('PRO QUALIFIER')) return 'PRO QUAL SIGNUP';
      if (qualifier.includes('ELITE QUALIFIER')) return 'ELITE QUAL REQ';
      if (qualifier.includes('WILDCARD')) return 'PRO QUAL REQ';
      return '';

    buildRegisteredTeamInfoMap(registeredRows) {
      const map = new Map();
      registeredRows.forEach(row => {
        const normalized = Utils.normalizeTeamName(RowAccess.getTeamName(row));
        if (normalized) map.set(normalized, row);
      });
      return map;

    getSeedRowNote(section, teamName, registeredInfoMap) {
      const canonicalTeamName = Rename.getCanonicalTeamName(teamName);
      const normalized = Utils.normalizeTeamName(canonicalTeamName);
      if (!normalized) return '';

      const row = registeredInfoMap.get(normalized);
      const notes = [];

      const renameNote = Rename.getSeedRenameNote(teamName);
      if (renameNote) notes.push(renameNote);

      if (!row) return notes.join(' • ');

      const listedDivision = this.detectSectionDivision(section.title);
      const signedDivision = String(row.divisionName || '').trim().toUpperCase();

      const qualifierNote = this.getQualifierNote(row);
      if (qualifierNote) notes.push(qualifierNote);

      if (
        signedDivision &&
        ['ELITE', 'PRO', 'LITE', 'CORE', 'NEO'].includes(listedDivision) &&
        signedDivision !== listedDivision &&
        !(listedDivision === 'CORE' && signedDivision === 'NEO')
      ) {
        notes.push('SIGNED UP TO ' + signedDivision);
      }

      return notes.join(' • ');
    },

    buildUnseededByDivision(registeredRows) {
      const listedTeams = this.collectPresetTeamNames();
      const result = { LITE: [], CORE: [], NEO: [] };

      registeredRows.forEach(row => {
        const teamName = RowAccess.getTeamName(row);
        const normalized = Utils.normalizeTeamName(teamName);
        const division = String(row.divisionName || '').trim().toUpperCase();

        if (!normalized || listedTeams.has(normalized)) return;
        if (!result[division]) return;

        result[division].push(row);
      });

      Object.keys(result).forEach(key => {
        result[key].sort((a, b) => String(a.teamName || '').localeCompare(String(b.teamName || ''), 'en'));
      });

      return result;

    buildProQualifierExtraRows(registeredRows) {
      const listedInProQual = this.collectProQualifierListedTeams();

      const rows = registeredRows.filter(row => {
        const qualifierNote = this.getQualifierNote(row);
        const normalized = Utils.normalizeTeamName(RowAccess.getTeamName(row));
        return normalized && !listedInProQual.has(normalized) &&
          (qualifierNote === 'PRO QUAL SIGNUP' || qualifierNote === 'PRO QUAL REQ');
      });

      rows.sort((a, b) => {
        const aNote = this.getQualifierNote(a);
        const bNote = this.getQualifierNote(b);
        if (aNote !== bNote) return aNote.localeCompare(bNote, 'en');
        return String(a.teamName || '').localeCompare(String(b.teamName || ''), 'en');
      });

      return rows;
    },

    getLiteSignupCount(registeredInfoMap) {
      const liteListedTeams = this.collectLiteListedTeams();
      let count = 0;

      liteListedTeams.forEach(normalized => {
        const info = registeredInfoMap.get(normalized);
        if (!info) return;
        const note = this.getQualifierNote(info);
        if (note === 'PRO QUAL REQ') return;
        count++;
      });

      return count;
    },

    buildSignupCounts(registeredRows, registeredInfoMap, proQualifierExtraRows) {
      const counts = {
        ELITE: 0,
        ELITE_QUAL: 0,
        PRO: 0,
        PRO_QUAL: 0,
        LITE: 0,
        CORE: 0,
        NEO: 0
      };

      registeredRows.forEach(row => {
        const division = String(row.divisionName || '').trim().toUpperCase();
        const qualifier = String(row.qualifierName || '').trim().toUpperCase();

        if (division === 'ELITE') counts.ELITE++;
        if (division === 'PRO') counts.PRO++;
        if (division === 'CORE') counts.CORE++;
        if (division === 'NEO') counts.NEO++;
        if (qualifier.includes('ELITE QUALIFIER')) counts.ELITE_QUAL++;
      });

      counts.LITE = this.getLiteSignupCount(registeredInfoMap);
      counts.PRO_QUAL = proQualifierExtraRows.length;

      return counts;
    },

    async buildSeedingSections(registeredRows, forceReload = false) {
      const registeredTeamSet = new Set(
        registeredRows.map(row => RowAccess.getTeamName(row)).map(name => Utils.normalizeTeamName(name)).filter(Boolean)
      );

      const registeredInfoMap = this.buildRegisteredTeamInfoMap(registeredRows);
      const signUpsMap = await DataService.getSignUpsMap(forceReload);
      const unseededByDivision = this.buildUnseededByDivision(registeredRows);
      const proQualifierExtraRows = this.buildProQualifierExtraRows(registeredRows);
      const signupCounts = this.buildSignupCounts(registeredRows, registeredInfoMap, proQualifierExtraRows);

      return PRESET_SECTIONS.map(section => {
        const sectionKey = this.detectSectionDivision(section.title);
        let count = signupCounts[sectionKey] ?? 0;
        const items = [];

        section.rows.forEach(row => {
          const [pos, seed, team] = row;
          const canonicalTeam = Rename.getCanonicalTeamName(team);
          const normalized = Utils.normalizeTeamName(canonicalTeam);
          const exists = team ? registeredTeamSet.has(normalized) : false;
          const note = team ? this.getSeedRowNote(section, team, registeredInfoMap) : '';
          const teamInfo = signUpsMap.get(normalized);
          const seedingStatus = this.getSeedingTeamStatus(canonicalTeam);
          const isDisbanded = seedingStatus === 'DISBANDED';

          items.push({
            pos,
            seed,
            team,
            displayTeam: canonicalTeam,
            exists,
            note,
            extraClass: '',
            teamID: teamInfo?.teamID || '',
            leagueID: teamInfo?.leagueID || '',
            statusText: isDisbanded ? 'Disbanded' : exists ? 'Registered' : canonicalTeam ? 'Missing' : '-',
            isMissing: !!canonicalTeam && !exists && !isDisbanded,
            isDisbanded,
            isUnlisted: false
          });
        });

        if (section.title === 'Pro Qualifiers') {
          const listedProQualCount = section.rows.filter(row => {
            const team = Rename.getCanonicalTeamName(row[2]);
            const normalized = Utils.normalizeTeamName(team);
            const info = registeredInfoMap.get(normalized);
            const note = info ? this.getQualifierNote(info) : '';
            return note === 'PRO QUAL SIGNUP' || note === 'PRO QUAL REQ';
          }).length;

          count = listedProQualCount + proQualifierExtraRows.length;

          const startIndex = section.rows.length + 1;
          proQualifierExtraRows.forEach((row, idx) => {
            items.push({
              pos: startIndex + idx,
              seed: 'Pro Qualifiers',
              team: row.teamName || '',
              displayTeam: Rename.getCanonicalTeamName(row.teamName || ''),
              exists: true,
              note: this.getSeedRowNote(section, row.teamName || '', registeredInfoMap),
              extraClass: 'unlisted',
              teamID: row.teamID || '',
              leagueID: row.leagueID || '',
              statusText: 'Registered',
              isMissing: false,
              isDisbanded: false,
              isUnlisted: true
            });
          });
        } else {
          const division = this.detectSectionDivision(section.title);
          const extraRows = ['LITE', 'CORE', 'NEO'].includes(division) ? unseededByDivision[division] : [];

          const startIndex = section.rows.length + 1;
          extraRows.forEach((row, idx) => {
            items.push({
              pos: startIndex + idx,
              seed: section.title + ' Unseeded',
              team: row.teamName || '',
              displayTeam: Rename.getCanonicalTeamName(row.teamName || ''),
              exists: true,
              note: this.getSeedRowNote(section, row.teamName || '', registeredInfoMap),
              extraClass: 'unlisted',
              teamID: row.teamID || '',
              leagueID: row.leagueID || '',
              statusText: 'Registered',
              isMissing: false,
              isDisbanded: false,
              isUnlisted: true
            });
          });
        }

        return {
          title: section.title,
          count,
          styleKey: this.getSectionStyleKey(section.title),
          items
        };
      });
    }
  };

  const BannedPlayersService = {
    async getCaptainUserIdMap(forceReload = false) {
      if (STATE.cache.captainUserIdMap && !forceReload) return STATE.cache.captainUserIdMap;

      const allData = await DataService.fetchAllaData(forceReload);
      const rows = Array.isArray(allData?.teamCaptains) ? allData.teamCaptains : [];
      const map = new Map();

      rows.forEach(originalRow => {
        const row = Rename.applyToRow(originalRow);
        const normalizedTeam = Utils.normalizeTeamName(row.teamName);
        const userId = String(row.userID || '').trim();
        if (!normalizedTeam || !userId) return;

        if (!map.has(normalizedTeam)) map.set(normalizedTeam, []);
        const ids = map.get(normalizedTeam);
        if (!ids.includes(userId)) ids.push(userId);
      });

      STATE.cache.captainUserIdMap = map;
      return map;
    },

    buildRoleDisplay(role) {
      const r = String(role || '').trim();
      if (!r) return '';
      if (r === 'Assistant Captain') return 'Assistant Captain';
      if (r === 'Captain') return 'Captain';
      return r;
    },

    buildPresenceRows(allData) {
      const rows = [];

      const teamCaptains = Array.isArray(allData?.teamCaptains) ? allData.teamCaptains : [];
      teamCaptains.forEach(originalRow => {
        const row = Rename.applyToRow(originalRow);
        const playerName = String(row.tag || '').trim();
        if (!playerName) return;

        rows.push({
          normalizedPlayer: Utils.normalizePlayerName(playerName),
          playerName,
          playerID: row.playerID || '',
          teamName: row.teamName || '',
          teamID: row.teamID || '',
          leagueID: row.leagueID || '',
          divisionName: row.leagueName || '',
          sourceKey: 'teamCaptains',
          matchRole: this.buildRoleDisplay(row.Role || 'Captain')
        });
      });

      const playerSources = ['backups', 'licenslosa', 'overgangar', 'proQualReqCheck'];
      playerSources.forEach(sourceKey => {
        const sourceRows = Array.isArray(allData?.[sourceKey]) ? allData[sourceKey] : [];
        sourceRows.forEach(originalRow => {
          const row = Rename.applyToRow(originalRow);
          const playerName = String(row.Player || row.tag || '').trim();
          if (!playerName) return;

          const teamMeta = sourceKey === 'overgangar' ? RowAccess.getTeamMeta(row, 'to') : RowAccess.getTeamMeta(row);

          rows.push({
            normalizedPlayer: Utils.normalizePlayerName(playerName),
            playerName,
            playerID: row.playerID || '',
            teamName: teamMeta?.teamName || row.teamName || row.To || '',
            teamID: teamMeta?.teamID || row.teamID || '',
            leagueID: teamMeta?.leagueID || row.leagueID || row.ToLeagueID || '',
            divisionName: row.divisionName || row.ToDiv || row.leagueName || '',
            sourceKey,
            matchRole: 'Player'
          });
        });
      });

      return rows;
    },

    getPlayerAliases(entry) {
      return [entry.playerName, ...(entry.aliases || [])]
        .map(name => String(name || '').trim())
        .filter(Boolean);
    },

    getRelevantBanMatches(entry, presenceRows) {
      const aliases = this.getPlayerAliases(entry).map(name => Utils.normalizePlayerName(name));
      const active = Rules.isBanActive(entry.until);
      if (!active) return [];

      const normalizedType = Rules.normalizeBanType(entry.banType);

      return presenceRows.filter(match => {
        if (!aliases.includes(match.normalizedPlayer)) return false;

        if (normalizedType === 'Captaincy ban') {
          return match.matchRole === 'Captain' || match.matchRole === 'Assistant Captain';
        }

        if (normalizedType === 'Suspension') return true;
        return false;
      });
    },

    getUniqueJoined(values) {
      return [...new Set(values.map(v => String(v || '').trim()).filter(Boolean))].join(' | ');
    },

    findTeamMetaForName(teamName, teamLinkMap) {
      return teamLinkMap.get(Utils.normalizeTeamName(teamName)) || null;
    },

    async buildRows(forceReload = false) {
      if (STATE.cache.bannedPlayersRows && !forceReload) return STATE.cache.bannedPlayersRows;

      const allData = await DataService.fetchAllaData(forceReload);
      const presenceRows = this.buildPresenceRows(allData);
      const teamLinkMap = await DataService.getTeamLinkMap(forceReload);

      const rows = BANNED_PLAYERS.map(entry => {
        const active = Rules.isBanActive(entry.until);
        const matches = this.getRelevantBanMatches(entry, presenceRows);

        const uniqueMatches = [];
        const seen = new Set();

        matches.forEach(match => {
          const key = [
            match.normalizedPlayer,
            Utils.normalizeTeamName(match.teamName),
            match.matchRole,
            match.sourceKey,
            match.divisionName,
            match.leagueID
          ].join('__');

          if (!seen.has(key)) {
            seen.add(key);
            uniqueMatches.push(match);
          }
        });

        const teamValues = uniqueMatches.map(match => {
          const meta = (match.teamID && match.leagueID)
            ? { teamID: match.teamID, leagueID: match.leagueID, teamName: match.teamName }
            : this.findTeamMetaForName(match.teamName, teamLinkMap);

          return meta
            ? `${match.teamName}|||${meta.teamID}|||${meta.leagueID}`
            : match.teamName;
        });

        return {
          playerName: entry.playerName,
          playerAliases: this.getPlayerAliases(entry).slice(1).join(', '),
          banType: Rules.normalizeBanType(entry.banType),
          until: entry.until,
          active: active ? 'Yes' : 'No',
          status: !active ? 'Expired' : uniqueMatches.length > 0 ? 'Violation' : 'Clear',
          foundAs: this.getUniqueJoined(uniqueMatches.map(match => match.matchRole)),
          teams: this.getUniqueJoined(teamValues),
          divisions: this.getUniqueJoined(uniqueMatches.map(match => match.divisionName || '-')),
          sources: this.getUniqueJoined(uniqueMatches.map(match => match.sourceKey)),
          notes: this.getUniqueJoined([
            entry.notes || '',
            uniqueMatches.map(match => {
              const parts = [match.matchRole, match.teamName, match.divisionName, match.sourceKey].filter(Boolean);
              return parts.join(' • ');
            }).join(' | ')
          ])
        };
      });

      STATE.cache.bannedPlayersRows = rows;
      return rows;
    }
  };

          const indexTd = document.createElement('td');
          indexTd.className = 'num';
          indexTd.textContent = index + 1;
          tr.appendChild(indexTd);
        }

        for (const col of visibleColumns) {
          const td = document.createElement('td');

          if (col === '__sendMail') {
            const games = RowAccess.getBackupGames(row);
            const actions = document.createElement('div');
            actions.className = 'icon-actions';

            if (STATE.currentSource.key === 'backups' && games !== null) {
              const mailUrl = await MessagingService.getBackupMessageUrl(row, forceReload);

              if (mailUrl) {
                const btn = document.createElement('a');
                btn.href = mailUrl;
                btn.target = '_blank';
                btn.rel = 'noopener noreferrer';
                btn.className = 'mail-icon-btn';
                btn.title = 'Open message';
                btn.textContent = '✉';
                actions.appendChild(btn);
              }

              const copyBtn = document.createElement('button');
              copyBtn.type = 'button';
              copyBtn.className = 'copy-icon-btn';
              copyBtn.title = 'Copy preset message';
              copyBtn.textContent = '⧉';
              copyBtn.addEventListener('click', async () => {
                try {
                  await MessagingService.copyBackupMessage(row);
                  Utils.setStatus('Message copied');
                } catch {
                  Utils.setStatus('Copy failed');
                }
              });
              actions.appendChild(copyBtn);
            }

            if (STATE.currentSource.key === 'licenslosa') {
              const mailUrl = await MessagingService.getBackupMessageUrl(row, forceReload);

              if (mailUrl) {
                const btn = document.createElement('a');
                btn.href = mailUrl;
                btn.target = '_blank';
                btn.rel = 'noopener noreferrer';
                btn.className = 'mail-icon-btn';
                btn.title = 'Open message';
                btn.textContent = '✉';
                actions.appendChild(btn);
              }

              const copyBtn = document.createElement('button');
              copyBtn.type = 'button';
              copyBtn.className = 'copy-icon-btn';
              copyBtn.title = 'Copy preset message';
              copyBtn.textContent = '⧉';
              copyBtn.addEventListener('click', async () => {
                try {
                  await MessagingService.copyUnlicensedMessage(row);
                  Utils.setStatus('Message copied');
                } catch {
                  Utils.setStatus('Copy failed');
                }
              });
              actions.appendChild(copyBtn);
            }

            td.appendChild(actions);
            tr.appendChild(td);
            continue;
          }

          if (STATE.currentNumericColumns.has(col) || col === 'fullLicenseCount') td.className = 'num';
          if (col === 'signupIssue' || col === 'notes') td.style.whiteSpace = 'normal';

          await this.renderTableCell(td, row, col, forceReload);
          tr.appendChild(td);
        }

        if (TableConfig.useTeamDropdownRows()) {
          const checkTd = document.createElement('td');

          if (Rules.isCompatibilityNotOk(row)) {
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'action-btn secondary';
            btn.style.padding = '7px 10px';
            btn.style.fontSize = '11px';
            btn.textContent = 'Check Team';
            checkTd.appendChild(btn);

            const detailItems = TableConfig.getDropdownDetailItems(row);
            detailRow = document.createElement('tr');
            detailRow.style.display = 'none';

            const detailCell = document.createElement('td');
            detailCell.colSpan = visibleColumns.length + (hideIndex ? 1 : 2);
            detailCell.style.padding = '0';
            detailCell.style.background = '#f8fbff';

            const detailBox = document.createElement('div');
            detailBox.style.padding = '14px';
            detailBox.style.borderTop = '1px solid #e4ebf5';

            const detailGrid = document.createElement('div');
            detailGrid.style.display = 'grid';
            detailGrid.style.gridTemplateColumns = 'repeat(auto-fit, minmax(240px, 1fr))';
            detailGrid.style.gap = '12px';

            if (detailItems.length > 0) {
              detailItems.forEach(item => detailGrid.appendChild(this.createTeamDetailCard(item.label, item.value)));
            } else {
              detailGrid.appendChild(this.createEmptyTeamDetailCard());
            }

            detailBox.appendChild(detailGrid);
            detailCell.appendChild(detailBox);
            detailRow.appendChild(detailCell);

            btn.addEventListener('click', () => {
              const open = detailRow.style.display !== 'table-row';
              detailRow.style.display = open ? 'table-row' : 'none';
              btn.textContent = open ? 'Hide Team' : 'Check Team';
            });
          }

          tr.appendChild(checkTd);
        }

        DOM.tbody.appendChild(tr);
        if (detailRow) DOM.tbody.appendChild(detailRow);
      }
    },

    async renderTable(rows, forceReload = false) {
      this.showNormalTable();

      if (!Array.isArray(rows) || rows.length === 0) {
        STATE.currentRows = [];
        STATE.currentColumns = [];
        STATE.currentNumericColumns = new Set();
        DOM.tbody.innerHTML = '';
        DOM.headerRow.innerHTML = '';
        DOM.emptyMessage.style.display = 'block';
        DOM.rowCounter.textContent = '';
        return;
      }

      DOM.emptyMessage.style.display = 'none';

      STATE.currentRows = STATE.currentSource.key === 'bannedPlayers'
        ? rows
        : rows.map(row => Rename.applyToRow(row));

      STATE.currentColumns = TableConfig.getColumns(STATE.currentRows);
      STATE.currentNumericColumns = new Set(
        STATE.currentColumns.filter(col =>
          col !== 'fullLicenseCount' &&
          col !== 'signupIssue' &&
          TableConfig.isNumericColumn(STATE.currentRows.map(r => {
            if (col === 'fullLicenseCount') return RowAccess.getFullLicenseCount(r);
            return r[col];
          }))
        )
      );
      STATE.currentNumericColumns.add('fullLicenseCount');

      this.renderSortableHeader();

      const filtered = Filters.getFilteredRows(Sorting.getSortedRows(STATE.currentRows));
      DOM.emptyMessage.style.display = filtered.length === 0 ? 'block' : 'none';

      if (STATE.currentSource.key === 'signUps') {
        DOM.rowCounter.textContent = `Anmälda lag: ${filtered.length} / ${STATE.currentRows.length}`;
      } else if (STATE.currentSource.key === 'bannedPlayers') {
        const activeCount = filtered.filter(row => row.active === 'Yes').length;
        const violationCount = filtered.filter(row => row.status === 'Violation').length;
        DOM.rowCounter.textContent = `Bans: ${filtered.length} / ${STATE.currentRows.length} • Active: ${activeCount} • Violations: ${violationCount}`;
      } else {
        DOM.rowCounter.textContent = `${filtered.length} row${filtered.length === 1 ? '' : 's'}`;
      }

      await this.renderTableBody(filtered, forceReload);
    },

    renderSeedingHeaderRow() {
      const tr = document.createElement('tr');
      tr.className = 'seed-header-row';
      ['#', 'Seed', 'Team', 'Status', 'Notes'].forEach(text => {
        const th = document.createElement('th');
        th.textContent = text;
        tr.appendChild(th);
      });
      DOM.seedingBody.appendChild(tr);
    },

    renderSectionTitle(title, count, styleKey) {
      const tr = document.createElement('tr');
      tr.className = 'section-title-row';

      const td = document.createElement('td');
      td.colSpan = 5;
      td.textContent = `${title} (${count})`;

      const styleConfig = DIVISION_STYLE_MAP[styleKey] || DIVISION_STYLE_MAP.elite;
      td.style.background = styleConfig.bg;
      td.style.color = styleConfig.text;

      tr.appendChild(td);
      DOM.seedingBody.appendChild(tr);
    },

    renderSeedRow(item) {
      const tr = document.createElement('tr');

      let rowClass = 'seed-row';
      if (item.extraClass) rowClass += ' ' + item.extraClass;
      if (item.displayTeam && item.isMissing && !item.isDisbanded) rowClass += ' missing';
      if (item.note || item.isDisbanded) rowClass += ' note';
      if (item.isDisbanded) rowClass += ' disbanded';
      tr.className = rowClass;

      const posTd = document.createElement('td');
      posTd.textContent = item.pos ?? '';
      tr.appendChild(posTd);

      const seedTd = document.createElement('td');
      seedTd.textContent = item.seed || '';
      tr.appendChild(seedTd);

      const teamTd = document.createElement('td');
      if (item.displayTeam && item.teamID && item.leagueID) {
        teamTd.appendChild(Utils.createLink(buildTeamUrl(item.leagueID, item.teamID), item.displayTeam, 'seed-link'));
      } else {
        teamTd.textContent = item.displayTeam || '';
      }
      tr.appendChild(teamTd);

      const statusTd = document.createElement('td');
      const badge = document.createElement('span');

      if (!item.displayTeam) {
        badge.className = 'seed-status empty';
        badge.textContent = '-';
      } else if (item.isDisbanded) {
        badge.className = 'seed-status disbanded';
        badge.textContent = 'Disbanded';
      } else if (item.exists) {
        badge.className = 'seed-status ok';
        badge.textContent = 'Registered';
      } else {
        badge.className = 'seed-status missing';
        badge.textContent = 'Missing';
      }

      statusTd.appendChild(badge);
      tr.appendChild(statusTd);

      const noteTd = document.createElement('td');
      const noteParts = [];
      if (item.note) noteParts.push(...item.note.split(' • ').filter(Boolean));
      if (item.isDisbanded) noteParts.unshift('DISBANDED');

      if (noteParts.length > 0) {
        noteParts.forEach(part => {
          const badgeEl = document.createElement('span');
          badgeEl.className = 'seed-note-badge' + (part === 'DISBANDED' ? ' disbanded' : '');
          badgeEl.textContent = part;
          noteTd.appendChild(badgeEl);
        });
      } else {
        noteTd.innerHTML = '<span style="color:#94a3b8;font-weight:700;">-</span>';
      }

      tr.appendChild(noteTd);
      DOM.seedingBody.appendChild(tr);
    },

    renderSpacer() {
      const tr = document.createElement('tr');
      const td = document.createElement('td');
      td.colSpan = 5;
      td.style.height = '12px';
      td.style.border = '0';
      td.style.padding = '0';
      tr.appendChild(td);
      DOM.seedingBody.appendChild(tr);
    },

    async renderSeeding(registeredRows, forceReload = false) {
      this.showSeeding();
      DOM.emptyMessage.style.display = 'none';
      DOM.tbody.innerHTML = '';
      DOM.headerRow.innerHTML = '';
      DOM.proQualReqWrap.innerHTML = '';
      DOM.seedingBody.innerHTML = '';
      DOM.rowCounter.textContent = '';

      const sections = await SeedingService.buildSeedingSections(registeredRows, forceReload);
      let visibleRows = 0;
      let renderedSections = 0;

      sections.forEach(section => {
        const filteredItems = Filters.getFilteredSeedingRows(section.title, section.items);
        if (filteredItems.length === 0) return;

        if (renderedSections > 0) this.renderSpacer();
        renderedSections += 1;
        visibleRows += filteredItems.length;

        this.renderSectionTitle(section.title, section.count, section.styleKey);
        this.renderSeedingHeaderRow();
        filteredItems.forEach(item => this.renderSeedRow(item));
      });

      if (visibleRows === 0) {
        DOM.seedingBody.innerHTML = '<tr><td colspan="5" class="empty">No seeding results found.</td></tr>';
      }

      DOM.rowCounter.textContent = `${visibleRows} seeding row${visibleRows === 1 ? '' : 's'}`;
    },

    groupProQualReqRows(rows) {
      const map = new Map();

      rows.forEach(row => {
        const teamID = row.teamID ?? '';
        const teamName = row.teamName ?? 'Unknown team';
        const leagueID = row.leagueID ?? '';
        const key = `${leagueID}__${teamID}__${teamName}`;

        if (!map.has(key)) {
          map.set(key, {
            teamID,
            leagueID,
            teamName,
            qualifierName: row.qualifierName || 'WILDCARD',
            players: []
          });
        }

        map.get(key).players.push(row);
      });

      return [...map.values()].sort((a, b) =>
        String(a.teamName).localeCompare(String(b.teamName), 'en', { sensitivity: 'base' })
      );
    },

    createHistoryCell(division, team, matches) {
      const td = document.createElement('td');

      if (!division && !team && (matches === null || matches === undefined || Number(matches) === 0)) {
        td.textContent = '';
        return td;
      }

      td.innerHTML = `
        <div style="font-weight:900;color:#0b144f;">${division || ''}</div>
        ${team ? `<div style="color:#334155;font-weight:700;white-space:normal;">${team}</div>` : ''}
        <div style="font-size:11px;color:#64748b;margin-top:2px;">${Number(matches || 0)} matches</div>
      `;
      return td;
    },

    async renderProQualReqCheck(rows, forceReload = false) {
      this.showProQualReq();
      DOM.emptyMessage.style.display = 'none';
      DOM.tbody.innerHTML = '';
      DOM.headerRow.innerHTML = '';
      DOM.seedingBody.innerHTML = '';
      DOM.proQualReqWrap.innerHTML = '';
      DOM.rowCounter.textContent = '';

      if (!Array.isArray(rows) || rows.length === 0) {
        DOM.proQualReqWrap.innerHTML = '<div class="empty">No wildcard teams found.</div>';
        return;
      }

      const teams = this.groupProQualReqRows(rows);
      const playerLinkMap = await DataService.getPlayerLinkMap(forceReload);

      teams.forEach((teamGroup, teamIndex) => {
        const teamBox = document.createElement('div');
        teamBox.style.borderBottom = '1px solid #e7ebf2';
        if (teamIndex === teams.length - 1) teamBox.style.borderBottom = '0';

        const headerBtn = document.createElement('button');
        headerBtn.type = 'button';
        headerBtn.style.width = '100%';
        headerBtn.style.border = '0';
        headerBtn.style.background = 'linear-gradient(to bottom, #ffffff, #fbfcff)';
        headerBtn.style.padding = '15px 16px';
        headerBtn.style.textAlign = 'left';
        headerBtn.style.cursor = 'pointer';
        headerBtn.style.display = 'flex';
        headerBtn.style.justifyContent = 'space-between';
        headerBtn.style.alignItems = 'center';
        headerBtn.style.gap = '16px';

        const left = document.createElement('div');
        const name = document.createElement('div');
        name.style.fontSize = '15px';
        name.style.fontWeight = '900';
        name.style.color = '#07124f';

        if (teamGroup.teamID && teamGroup.leagueID) {
          name.appendChild(Utils.createLink(buildTeamUrl(teamGroup.leagueID, teamGroup.teamID), teamGroup.teamName, 'proqual-link'));
        } else {
          name.textContent = teamGroup.teamName;
        }

        const meta = document.createElement('div');
        meta.style.fontSize = '11px';
        meta.style.color = '#64748b';
        meta.style.textTransform = 'uppercase';
        meta.style.letterSpacing = '0.4px';
        meta.textContent = `${teamGroup.qualifierName || 'WILDCARD'}${teamGroup.teamID ? ' • TEAM ID ' + teamGroup.teamID : ''}`;

        left.appendChild(name);
        left.appendChild(meta);

        const right = document.createElement('div');
        right.style.display = 'flex';
        right.style.alignItems = 'center';
        right.style.gap = '10px';

        const count = document.createElement('div');
        count.textContent = `${teamGroup.players.length} players`;
        count.style.fontSize = '12px';
        count.style.fontWeight = '900';
        count.style.color = '#334155';
        count.style.background = '#eef3ff';
        count.style.border = '1px solid #d8e2ff';
        count.style.borderRadius = '999px';
        count.style.padding = '6px 10px';

        const arrow = document.createElement('div');
        arrow.textContent = teamIndex === 0 ? '▼' : '▶';
        arrow.style.fontWeight = '900';

        right.appendChild(count);
        right.appendChild(arrow);

        headerBtn.appendChild(left);
        headerBtn.appendChild(right);

        const body = document.createElement('div');
        body.style.display = teamIndex === 0 ? 'block' : 'none';
        body.style.padding = '0 16px 16px';
        body.style.background = '#fcfdff';

        const table = document.createElement('table');
        table.style.minWidth = '900px';
        table.innerHTML = `
          <thead>
            <tr>
              <th>#</th>
              <th>Player</th>
              <th>Latest ECL</th>
              <th>2nd Latest</th>
              <th>3rd Latest</th>
            </tr>
          </thead>
        `;

        const tbody = document.createElement('tbody');
        const sortedPlayers = [...teamGroup.players].sort((a, b) =>
          String(a.Player || '').localeCompare(String(b.Player || ''), 'en', { sensitivity: 'base' })
        );

        sortedPlayers.forEach((player, index) => {
          const tr = document.createElement('tr');

          const idx = document.createElement('td');
          idx.className = 'num';
          idx.textContent = index + 1;
          tr.appendChild(idx);

          const playerTd = document.createElement('td');
          const playerName = player.Player || player.tag || '';
          const directPlayerID = RowAccess.getPlayerId(player);
          const mappedPlayerID = playerLinkMap.get(Utils.normalizePlayerName(playerName));

          if (directPlayerID || mappedPlayerID) {
            playerTd.appendChild(Utils.createLink(PLAYER_BASE_URL + (directPlayerID || mappedPlayerID), playerName, 'proqual-link'));
          } else {
            playerTd.textContent = playerName;
          }
          tr.appendChild(playerTd);

          tr.appendChild(this.createHistoryCell(player.history1Division, player.history1Team, player.history1Matches));
          tr.appendChild(this.createHistoryCell(player.history2Division, player.history2Team, player.history2Matches));
          tr.appendChild(this.createHistoryCell(player.history3Division, player.history3Team, player.history3Matches));

          tbody.appendChild(tr);
        });

        table.appendChild(tbody);
        body.appendChild(table);

        headerBtn.addEventListener('click', (e) => {
          if (e.target.closest('a')) return;
          const open = body.style.display !== 'block';
          body.style.display = open ? 'block' : 'none';
          arrow.textContent = open ? '▼' : '▶';
        });

        teamBox.appendChild(headerBtn);
        teamBox.appendChild(body);
        DOM.proQualReqWrap.appendChild(teamBox);
      });

      DOM.rowCounter.textContent = `${rows.length} player row${rows.length === 1 ? '' : 's'}`;
    }
  };

  const Loader = {
    getProQualReqCheckRows(allData) {
      if (Array.isArray(allData?.proQualReqCheck)) {
        return allData.proQualReqCheck.map(row => Rename.applyToRow(row));
      }

      const signUps = DataService.getRowsForSource(allData, 'signUps');

      return signUps
        .map(row => Rename.applyToRow(row))
        .filter(row => String(row?.qualifierName || '').trim().toUpperCase().includes('WILDCARD'))
        .map(row => ({
          teamID: row.teamID ?? '',
          leagueID: row.leagueID ?? '',
          teamName: row.teamName ?? '',
          qualifierName: row.qualifierName ?? '',
          divisionName: row.divisionName ?? '',
          teamCountry: row.teamCountry ?? '',
          registrationDate: row.registrationDate ?? ''
        }));
    },

    async loadRegisteredTeams(forceReload = false) {
      const allData = await DataService.fetchAllaData(forceReload);
      return DataService.getRowsForSource(allData, 'signUps').map(row => Rename.applyToRow(row));
    },

    async loadSourceData(forceReload = false) {
      if (STATE.currentSource.type === 'preset') {
        return await this.loadRegisteredTeams(forceReload);
      }

      const allData = await DataService.fetchAllaData(forceReload);

      if (STATE.currentSource.type === 'proqualreqcheck') {
        return this.getProQualReqCheckRows(allData);
      }

      if (STATE.currentSource.type === 'banned') {
        return await BannedPlayersService.buildRows(forceReload);
      }

      return DataService
        .getRowsForSource(allData, STATE.currentSource.key)
        .map(row => Rename.applyToRow(row));
    }
  };

  const App = {
    unlockPage() {
      DOM.loginScreen.classList.add('hidden');
      DOM.siteShell.classList.remove('locked');
    },

    tryLogin() {
      if (DOM.passwordInput.value === CONFIG.ADMIN_PASSWORD) {
        DOM.loginError.style.display = 'none';
        sessionStorage.setItem('sg_admin_access', 'granted');
        this.unlockPage();
      } else {
        DOM.loginError.style.display = 'block';
      }
    },

    openMobileMenu() {
      DOM.mobileTabsPanel.classList.add('open');
      DOM.mobileTabsPanel.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    },

    closeMobileMenu() {
      DOM.mobileTabsPanel.classList.remove('open');
      DOM.mobileTabsPanel.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    },

    selectSource(source) {
      STATE.currentSource = source;
      STATE.sortState = { column: null, direction: 'asc' };

      if (STATE.currentSource.type !== 'preset') {
        DOM.seedingFilterSelect.value = 'all';
      }

      Render.renderTabs();
      Render.setCsvButtonVisibility();
      this.closeMobileMenu();
      this.applyFiltersAndRender();
    },

    async applyFiltersAndRender(forceReload = false) {
      Utils.clearError();
      Utils.setStatus('Loading data...');
      DOM.reloadBtn.disabled = true;
      DOM.pageTitle.textContent = STATE.currentSource.label;
      Render.setCsvButtonVisibility();

      try {
        const data = await Loader.loadSourceData(forceReload);

        if (STATE.currentSource.type === 'preset') {
          await Render.renderSeeding(data, forceReload);
        } else if (STATE.currentSource.type === 'proqualreqcheck') {
          const filtered = Filters.getFilteredRows(data);
          await Render.renderProQualReqCheck(filtered, forceReload);
        } else {
          await Render.renderTable(data, forceReload);
        }

        Utils.setStatus('Done');
        DOM.lastUpdated.textContent = 'Last updated: ' + Utils.toDisplayDate();
      } catch (err) {
        console.error(err);

        DOM.tbody.innerHTML = '';
        DOM.headerRow.innerHTML = '';
        DOM.seedingBody.innerHTML = '';
        DOM.proQualReqWrap.innerHTML = '';

        STATE.currentRows = [];
        STATE.currentColumns = [];
        STATE.currentNumericColumns = new Set();

        DOM.emptyMessage.style.display = 'none';
        DOM.rowCounter.textContent = '';

        if (STATE.currentSource.type === 'preset') {
          Render.showSeeding();
        } else if (STATE.currentSource.type === 'proqualreqcheck') {
          Render.showProQualReq();
        } else {
          Render.showNormalTable();
        }

        Utils.showError('Could not load data: ' + err.message);
        Utils.setStatus('Error');
      } finally {
        DOM.reloadBtn.disabled = false;
      }
    },

    bindEvents() {
      DOM.loginBtn.addEventListener('click', () => this.tryLogin());
      DOM.passwordInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') this.tryLogin();
      });

      DOM.mobileMenuBtn.addEventListener('click', () => this.openMobileMenu());
      DOM.mobileCloseBtn.addEventListener('click', () => this.closeMobileMenu());

      DOM.mobileTabsPanel.addEventListener('click', (e) => {
        if (e.target === DOM.mobileTabsPanel) this.closeMobileMenu();
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') this.closeMobileMenu();
      });

      DOM.reloadBtn.addEventListener('click', async () => {
        Utils.clearCaches();
        await this.applyFiltersAndRender(true);
      });

      DOM.clearFiltersBtn.addEventListener('click', async () => {
        DOM.searchInput.value = '';
        DOM.flaggedOnlyToggle.checked = false;
        DOM.seedingFilterSelect.value = 'all';
        await this.applyFiltersAndRender();
      });

      DOM.csvExportBtn.addEventListener('click', () => {
        Exporter.exportCurrentTableCsv();
      });

      DOM.searchInput.addEventListener('input', async () => {
        await this.applyFiltersAndRender();
      });

      DOM.flaggedOnlyToggle.addEventListener('change', async () => {
        if (STATE.currentSource.type === 'preset') return;
        await this.applyFiltersAndRender();
      });

      DOM.seedingFilterSelect.addEventListener('change', async () => {
        if (STATE.currentSource.type !== 'preset') return;
        await this.applyFiltersAndRender();
      });
    },

    init() {
      if (sessionStorage.getItem('sg_admin_access') === 'granted') {
        this.unlockPage();
      }

      this.bindEvents();
      Render.renderTabs();
      Render.setCsvButtonVisibility();
      this.applyFiltersAndRender();
    }
  };

  App.init();
</script>
</body>
</html>
